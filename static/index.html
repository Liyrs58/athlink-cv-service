<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHLINK CV - Elite Football Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #111827;
            --border: #1f2937;
            --teal: #00d4aa;
            --blue: #3b82f6;
            --text: #ffffff;
            --muted: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gold: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 980px; margin: 0 auto; padding: 40px 20px; }

        /* ── HEADER ── */
        header { padding-bottom: 28px; margin-bottom: 36px; border-bottom: 1px solid var(--border); }
        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px; font-weight: 700;
            letter-spacing: 3px; color: var(--text);
            margin-bottom: 6px;
        }
        .logo-line {
            width: 60px; height: 2px;
            background: var(--teal);
            box-shadow: 0 0 8px #00d4aa40;
            margin-bottom: 8px;
        }
        .tagline { font-size: 13px; color: #6b7280; font-family: 'Inter', sans-serif; }

        /* ── UPLOAD ── */
        #uploadSection { text-align: center; }
        .upload-zone {
            border: 2px dashed var(--teal);
            border-radius: 16px;
            padding: 80px 40px;
            background: var(--card);
            cursor: pointer;
            transition: all 0.3s;
            max-width: 620px;
            margin: 0 auto 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #00ffcc;
            background: rgba(0,212,170,0.04);
            box-shadow: 0 0 24px rgba(0,212,170,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .pitch-icon { margin: 0 auto 18px; display: block; }
        .upload-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px; font-weight: 700;
            letter-spacing: 1px; color: var(--text);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .upload-subtext { font-size: 13px; color: var(--muted); font-family: 'Inter', sans-serif; }
        .file-name-display {
            margin: 10px 0 4px;
            font-size: 13px; color: var(--teal); font-family: 'Inter', sans-serif;
            display: none;
        }
        .file-info { display: none; }
        .analyse-btn {
            background: var(--teal); color: #000; border: none;
            padding: 15px 0; font-size: 16px; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 2px;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; transition: all 0.25s;
            display: none; width: 100%; max-width: 620px;
            box-shadow: 0 0 16px rgba(0,212,170,0.25);
        }
        .analyse-btn:hover { background: #00ffcc; box-shadow: 0 0 24px rgba(0,212,170,0.4); }
        input[type="file"] { display: none; }

        /* ── LOADING ── */
        #loadingSection { display: none; }
        .loading-inner {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 60vh; text-align: center;
        }
        .progress-bar-top {
            position: fixed; top: 0; left: 0; right: 0;
            height: 4px; background: rgba(0,212,170,0.15);
            z-index: 100;
        }
        .progress-bar-fill {
            height: 100%; background: var(--teal);
            box-shadow: 0 0 8px var(--teal);
            animation: pulse-bar 2.5s ease-in-out infinite;
        }
        @keyframes pulse-bar { 0%,100%{width:15%} 50%{width:75%} }
        .loading-msg {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px; font-weight: 700; letter-spacing: 2px;
            color: var(--text); margin-bottom: 24px;
            min-height: 40px;
            transition: opacity 0.3s;
            text-transform: uppercase;
        }
        .elapsed-time {
            font-family: monospace; font-size: 42px;
            color: var(--teal); margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .loading-sub { font-size: 13px; color: #6b7280; margin-bottom: 32px; }
        .cancel-btn {
            background: transparent; color: var(--muted);
            border: 1px solid var(--border);
            padding: 9px 24px; border-radius: 6px;
            font-size: 13px; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .cancel-btn:hover { border-color: #374151; color: var(--text); }

        /* ── ERROR ── */
        #errorSection { display: none; text-align: center; padding: 80px 20px; }
        .error-box {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 24px; color: #fca5a5;
            max-width: 500px; margin: 0 auto 20px; font-size: 14px;
        }
        .retry-btn {
            background: rgba(239,68,68,0.15); color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3); padding: 10px 24px;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* ── TABS ── */
        #resultsSection { display: none; }
        .tab-bar {
            display: flex; gap: 0; border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }
        .tab-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 12px 20px; background: none; border: none;
            color: #6b7280; cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn.active { color: var(--text); border-bottom-color: var(--teal); }
        .tab-btn:hover:not(.active) { color: var(--muted); }
        .tab-pane { display: none; opacity: 0; transition: opacity 0.2s; }
        .tab-pane.active { display: block; opacity: 1; }

        /* ── CARDS ── */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 2px;
            font-weight: 600; margin-bottom: 18px;
        }
        .card-title-row {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 18px;
        }
        .card-title-row .card-title { margin-bottom: 0; }

        /* ── BRAIN BANNER ── */
        .brain-banner {
            border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
        }
        .brain-banner.visible { opacity: 1; transform: translateY(0); }
        .brain-high { background: rgba(0,212,170,0.06); border: 1px solid var(--teal); box-shadow: 0 0 8px #00d4aa20; }
        .brain-medium { background: rgba(245,158,11,0.06); border: 1px solid var(--warning); }
        .brain-low { background: rgba(239,68,68,0.06); border: 1px solid var(--danger); }
        .brain-label {
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--muted); margin-bottom: 8px;
        }
        .brain-verdict { font-size: 14px; color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.7; margin-bottom: 14px; }
        .brain-pills-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
        .brain-pills-label {
            font-family: 'Rajdhani', sans-serif; font-size: 10px;
            font-weight: 700; color: var(--muted); letter-spacing: 1px;
            text-transform: uppercase; margin-right: 2px;
        }
        .metric-pill {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .pill-trust { background: rgba(0,212,170,0.15); color: var(--teal); }
        .pill-question { background: rgba(245,158,11,0.15); color: var(--warning); }

        /* ── CONFIDENCE CIRCLE ── */
        .conf-row {
            display: flex; align-items: center; gap: 24px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
        }
        .conf-row.visible { opacity: 1; transform: translateY(0); }
        .grade-circle {
            width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700; color: var(--text);
        }
        .g-a { background: rgba(0,212,170,0.12); border: 2px solid var(--teal); box-shadow: 0 0 16px rgba(0,212,170,0.25); }
        .g-b { background: rgba(59,130,246,0.12); border: 2px solid var(--blue); box-shadow: 0 0 16px rgba(59,130,246,0.25); }
        .g-c { background: rgba(245,158,11,0.12); border: 2px solid var(--warning); box-shadow: 0 0 16px rgba(245,158,11,0.25); }
        .g-d { background: rgba(239,68,68,0.12); border: 2px solid var(--danger); box-shadow: 0 0 16px rgba(239,68,68,0.25); }
        .conf-text { font-size: 14px; color: #d1d5db; font-family: 'Inter', sans-serif; line-height: 1.7; }
        .conf-section-label {
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px;
        }

        /* ── MATCH FLOW TIMELINE ── */
        .tl-bar { display: flex; height: 40px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; background: var(--border); }
        .tl-seg { height: 100%; display: flex; align-items: center; justify-content: center;
            font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
        .tl-open { background: rgba(0,212,170,0.6); color: #003d30; }
        .tl-dead { background: #1f2937; color: #4b5563; }
        .tl-times { display: flex; justify-content: space-between; font-size: 11px; color: #4b5563; margin-bottom: 8px; }
        .tl-summary { font-size: 13px; color: var(--muted); }

        /* ── PITCH CONTROL ── */
        .ctrl-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: center; margin-bottom: 16px; }
        .ctrl-name { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .ctrl-pct { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; }
        .ctrl-bar { height: 16px; border-radius: 8px; overflow: hidden; display: flex; margin-bottom: 12px; }
        .ctrl-bar-left { height: 100%; background: var(--teal); }
        .ctrl-bar-right { height: 100%; background: var(--danger); }
        .ctrl-verdict { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .ctrl-frames { font-size: 11px; color: #4b5563; }

        /* ── SPIDER CHART ── */
        .spider-wrap { display: flex; flex-direction: column; align-items: center; }
        .spider-legend { display: flex; gap: 24px; margin-top: 12px; font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .spider-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .spider-interp { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.8; text-align: center; font-family: 'Inter', sans-serif; }

        /* ── BIG NUMBERS ── */
        .big-nums { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
        .big-num-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px 16px; text-align: center; }
        .big-num { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; color: var(--teal); }
        .big-num-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }

        /* ── PLAYER CARDS ── */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-pill {
            font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 6px 16px; border-radius: 20px; cursor: pointer;
            border: 1px solid var(--border); background: none; color: var(--muted);
            transition: all 0.2s;
        }
        .filter-pill.active { background: var(--teal); color: #000; border-color: var(--teal); }
        .filter-pill:hover:not(.active) { border-color: #374151; color: var(--text); }
        .player-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
        .p-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px; cursor: pointer;
            transition: border-color 0.2s;
        }
        .p-card:hover { border-color: #374151; }
        .p-card.expanded { border-color: var(--teal); box-shadow: 0 0 8px #00d4aa20; }
        .p-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
        .p-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; flex: 1; }
        .p-team-badge {
            font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 2px 10px; border-radius: 10px;
        }
        .badge-blue { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .badge-red { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .badge-other { background: rgba(107,114,128,0.2); color: #d1d5db; }
        .p-conf-badge {
            font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .conf-high { color: var(--teal); }
        .conf-med { color: var(--warning); }
        .conf-low { color: var(--danger); }
        .p-divider { height: 1px; background: var(--border); margin: 12px 0; }
        .p-attrs { display: flex; gap: 14px; margin-bottom: 12px; }
        .p-attr { text-align: center; }
        .p-attr-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .p-attr-val { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); }
        .p-stats-rows { font-size: 12px; line-height: 2; margin-bottom: 12px; }
        .p-stat-row { display: flex; justify-content: space-between; }
        .p-stat-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .p-stat-val { font-family: 'Inter', sans-serif; font-size: 12px; color: #d1d5db; font-weight: 500; }
        .p-bar-row { margin-bottom: 8px; }
        .p-bar-label-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .p-bar-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .p-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .p-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s; }
        .p-bar-teal { background: var(--teal); }
        .p-bar-red { background: var(--danger); }
        .p-bar-amber { background: var(--warning); }
        .p-expand { display: none; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; font-size: 12px; color: #9ca3af; line-height: 1.8; }
        .p-expand.open { display: block; }
        .expand-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .traj-predict-box { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 12px; color: #93c5fd; }
        .dev-label-badge {
            display: inline-block; padding: 2px 8px; border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }

        /* ── COACHING REPORT ── */
        .report-wrap { position: relative; }
        .report-text { font-size: 14px; line-height: 1.8; color: #d1d5db; white-space: pre-wrap; word-break: break-word; font-family: 'Inter', sans-serif; }
        .copy-btn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--border); color: var(--text); }

        /* ── FATIGUE CLOCK ── */
        .fatigue-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .fatigue-team { text-align: center; }
        .fatigue-team-label { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .fatigue-bar-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 6px; }
        .fatigue-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s; }
        .fatigue-val { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; }
        .fatigue-lv { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .most-fatigued-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #fca5a5; font-family: 'Inter', sans-serif; }
        .fatigue-toggle-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; width: 100%; text-align: left; }
        .fatigue-player-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 12px; margin-top: 14px; display: none; }
        .fatigue-player-grid.open { display: grid; }
        .fatigue-p-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
        .fatigue-p-card.highlight { border-color: var(--danger); }
        .fp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .fp-id { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; }
        .fp-score { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .fp-metrics { font-size: 11px; color: #6b7280; line-height: 1.9; font-family: 'Inter', sans-serif; }
        .fp-metrics span { color: #d1d5db; font-weight: 600; }

        /* ── TRAJECTORY ── */
        .traj-empty { color: var(--muted); font-style: italic; font-size: 13px; font-family: 'Inter', sans-serif; }
        .traj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .traj-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
        .traj-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .traj-pid { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1px; }
        .traj-rows { font-size: 13px; color: #d1d5db; line-height: 2; font-family: 'Inter', sans-serif; }
        .traj-arrow { font-weight: 700; margin-right: 4px; }
        .traj-predict { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 12px; color: #93c5fd; font-family: 'Inter', sans-serif; }
        .traj-predict-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .traj-consistency { margin-top: 10px; font-size: 12px; color: #6b7280; font-family: 'Inter', sans-serif; }
        .traj-consistency span { color: #d1d5db; font-weight: 700; }
        .traj-report-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 12px; }
        .traj-report-btn:hover { border-color: #374151; color: var(--muted); }
        .traj-report-body { display: none; margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.8; white-space: pre-wrap; background: #0d1117; border-radius: 6px; padding: 14px; font-family: 'Inter', sans-serif; }
        .traj-report-body.open { display: block; }

        /* ── DATA QUALITY ── */
        .dq-toggle { display: flex; align-items: center; cursor: pointer; }
        .dq-title { flex: 1; font-family: 'Rajdhani', sans-serif; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .dq-arrow { font-size: 10px; color: var(--muted); transition: transform 0.3s; }
        .dq-arrow.open { transform: rotate(180deg); }
        .dq-body { display: none; margin-top: 16px; background: var(--bg); border-radius: 8px; padding: 20px; }
        .dq-body.open { display: block; }
        .dq-sub { margin-bottom: 14px; }
        .dq-sub:last-child { margin-bottom: 0; }
        .dq-sub-title { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; color: var(--text); }
        .dq-sub-items { font-size: 12px; color: var(--muted); line-height: 1.7; font-family: 'Inter', sans-serif; }

        /* ── FOOTER ── */
        footer { text-align: center; padding: 40px 0 20px; font-size: 12px; color: #374151; font-family: 'Inter', sans-serif; }

        /* ── MODE BUTTONS ── */
        .mode-bar {
            display: flex; gap: 12px; justify-content: center;
            margin: 0 auto 16px; max-width: 620px;
        }
        .mode-btn {
            flex: 1; padding: 14px 0; border: 2px solid var(--border);
            border-radius: 10px; background: var(--card); color: var(--muted);
            font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
            transition: all 0.25s;
        }
        .mode-btn.active { border-color: var(--teal); color: var(--text); box-shadow: 0 0 12px rgba(0,212,170,0.15); }
        .mode-btn:hover:not(.active) { border-color: #374151; color: var(--text); }

        /* ── LIVE PLAYER ── */
        #liveSection { display: none; }
        .live-wrap { max-width: 900px; margin: 0 auto; }
        .live-video-wrap {
            position: relative; width: 100%; background: #000;
            border-radius: 12px; overflow: hidden; margin-bottom: 16px;
        }
        .live-video-wrap video {
            display: block; width: 100%; max-height: 520px; object-fit: contain;
        }
        .live-video-wrap canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .live-progress {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
        }
        .live-progress-bar-bg {
            height: 8px; background: var(--border); border-radius: 4px;
            overflow: hidden; margin-bottom: 10px;
        }
        .live-progress-bar-fill {
            height: 100%; background: var(--teal); border-radius: 4px;
            transition: width 0.3s;
        }
        .live-stats {
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted);
        }
        .live-stats span { color: var(--text); font-weight: 600; }

        /* ── UNCERTAIN CARDS ── */
        .uncertain-stack { max-width: 900px; margin: 0 auto; }
        .uncertain-card {
            background: var(--card); border: 1px solid var(--warning);
            border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 16px;
            animation: uc-fade-in 0.3s;
        }
        @keyframes uc-fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .uc-crop {
            width: 56px; height: 72px; border-radius: 6px;
            background: var(--border); object-fit: cover; flex-shrink: 0;
        }
        .uc-info { flex: 1; }
        .uc-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--warning); margin-bottom: 6px; }
        .uc-team { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
        .uc-fields { display: flex; gap: 8px; margin-bottom: 8px; }
        .uc-fields input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif;
            width: 80px;
        }
        .uc-fields input:last-child { width: 140px; }
        .uc-fields input::placeholder { color: #4b5563; }
        .uc-actions { display: flex; gap: 8px; }
        .uc-confirm-btn {
            background: var(--teal); color: #000; border: none;
            padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer;
        }
        .uc-skip-btn {
            background: none; color: var(--muted); border: 1px solid var(--border);
            padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer;
        }
        .uc-timer-bar {
            height: 3px; background: var(--border); border-radius: 2px;
            margin-top: 8px; overflow: hidden;
        }
        .uc-timer-fill {
            height: 100%; background: var(--warning); border-radius: 2px;
            transition: width 0.5s linear;
        }
        .live-finalising {
            text-align: center; padding: 40px 20px;
            font-family: 'Rajdhani', sans-serif; font-size: 20px;
            font-weight: 700; letter-spacing: 1px; color: var(--muted);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .container { padding: 20px 16px; }
            .upload-zone { padding: 48px 20px; }
            .player-grid { grid-template-columns: 1fr; }
            .big-nums { grid-template-columns: 1fr; gap: 10px; }
            .ctrl-nums, .fatigue-teams { grid-template-columns: 1fr; }
            .conf-row { flex-direction: column; text-align: center; }
            .traj-grid { grid-template-columns: 1fr; }
            .uncertain-card { flex-direction: column; align-items: flex-start; }
            .uc-fields { flex-direction: column; }
            .uc-fields input { width: 100% !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">ATHLINK CV</div>
        <div class="logo-line"></div>
        <div class="tagline">Elite Analysis. Any Match. 90 Seconds.</div>
    </header>

    <main>
        <!-- UPLOAD -->
        <section id="uploadSection">
            <div class="upload-zone" id="uploadZone">
                <svg class="pitch-icon" width="64" height="44" viewBox="0 0 64 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="1" width="62" height="42" rx="2" stroke="#00d4aa" stroke-width="1.5" fill="none"/>
                    <line x1="32" y1="1" x2="32" y2="43" stroke="#00d4aa" stroke-width="1"/>
                    <circle cx="32" cy="22" r="7" stroke="#00d4aa" stroke-width="1" fill="none"/>
                    <rect x="1" y="13" width="10" height="18" stroke="#00d4aa" stroke-width="1" fill="none"/>
                    <rect x="53" y="13" width="10" height="18" stroke="#00d4aa" stroke-width="1" fill="none"/>
                    <circle cx="32" cy="22" r="1" fill="#00d4aa"/>
                    <circle cx="1" cy="22" r="0" fill="none"/>
                </svg>
                <div class="upload-text">Drop Match Footage Here</div>
                <div class="upload-subtext">or click to browse — accepts any video format</div>
                <div class="file-name-display" id="fileNameDisplay"></div>
            </div>
            <input type="file" id="fileInput" accept="video/*">
            <div class="file-info" id="fileInfo"><span id="fileName"></span></div>
            <div class="mode-bar" id="modeBar" style="display:none">
                <button class="mode-btn active" id="modeLive" onclick="setMode('live')">&#9654; Live Analysis</button>
                <button class="mode-btn" id="modeQuick" onclick="setMode('quick')">&#9889; Quick Analysis</button>
            </div>
            <button class="analyse-btn" id="analyseBtn">Analyse Match</button>
        </section>

        <!-- LOADING -->
        <section id="loadingSection">
            <div class="progress-bar-top"><div class="progress-bar-fill"></div></div>
            <div class="loading-inner">
                <div class="loading-msg" id="loadingStatus">TRACKING PLAYERS...</div>
                <div class="elapsed-time" id="elapsed">00:00:00</div>
                <div class="loading-sub">Processing your footage</div>
                <button class="cancel-btn" id="cancelBtn">Cancel</button>
            </div>
        </section>

        <!-- LIVE PLAYER -->
        <section id="liveSection">
            <div class="live-wrap">
                <div class="live-video-wrap">
                    <video id="liveVideo" muted playsinline></video>
                    <canvas id="liveCanvas"></canvas>
                </div>
                <div class="live-progress">
                    <div class="live-progress-bar-bg"><div class="live-progress-bar-fill" id="liveProgressFill" style="width:0%"></div></div>
                    <div class="live-stats">
                        <span id="liveFrameInfo">Frame 0/0</span>
                        <span id="livePlayerInfo">0 confirmed &middot; 0 uncertain</span>
                        <span id="liveElapsed">00:00</span>
                    </div>
                </div>
            </div>
            <div class="uncertain-stack" id="uncertainStack"></div>
        </section>

        <!-- RESULTS -->
        <section id="resultsSection">
            <div class="tab-bar" id="tabBar">
                <button class="tab-btn active" onclick="switchTab('overview')">Match Overview</button>
                <button class="tab-btn" onclick="switchTab('players')">Players</button>
                <button class="tab-btn" onclick="switchTab('analyst')">Analyst</button>
            </div>
            <div id="pane-overview" class="tab-pane active"></div>
            <div id="pane-players" class="tab-pane"></div>
            <div id="pane-analyst" class="tab-pane"></div>
        </section>

        <!-- ERROR -->
        <section id="errorSection">
            <div class="error-box" id="errorMessage">Analysis failed.</div>
            <button class="retry-btn" onclick="location.reload()">Try Again</button>
        </section>
    </main>

    <footer>Powered by Athlink CV</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const API_BASE = 'https://web-production-6b7ca.up.railway.app';

const LOADING_MSGS = [
    'TRACKING PLAYERS...',
    'MEASURING SPRINT SPEEDS...',
    'MAPPING TEAM SHAPE...',
    'RUNNING BRAIN ANALYSIS...',
    'DETECTING FATIGUE PATTERNS...',
    'GENERATING REPORT...'
];

let msgIdx = 0, startTime, timerIv, msgIv, pollIv;
let selectedFile = null;
let analysisMode = 'live'; // 'live' or 'quick'

// ── Upload events ──
const zone = $('uploadZone'), fInput = $('fileInput');
zone.addEventListener('click', () => fInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) pickFile(e.dataTransfer.files[0]);
});
fInput.addEventListener('change', e => { if (e.target.files.length) pickFile(e.target.files[0]); });

function pickFile(f) {
    if (!f.type.startsWith('video/')) return alert('Please select a video file');
    selectedFile = f;
    $('fileName').textContent = f.name;
    $('fileInfo').style.display = 'block';
    $('fileNameDisplay').textContent = f.name;
    $('fileNameDisplay').style.display = 'block';
    $('modeBar').style.display = 'flex';
    $('analyseBtn').style.display = 'block';
}

function setMode(mode) {
    analysisMode = mode;
    $('modeLive').classList.toggle('active', mode === 'live');
    $('modeQuick').classList.toggle('active', mode === 'quick');
}

$('analyseBtn').addEventListener('click', startAnalysis);
$('cancelBtn').addEventListener('click', () => {
    clearInterval(pollIv); clearInterval(timerIv); clearInterval(msgIv);
    $('loadingSection').style.display = 'none';
    $('uploadSection').style.display = 'block';
});

function startAnalysis() {
    if (!selectedFile) return;
    if (analysisMode === 'live') { startLiveAnalysis(); return; }
    show('loadingSection'); hide('uploadSection', 'resultsSection', 'errorSection');

    msgIdx = 0; startTime = Date.now();
    $('loadingStatus').textContent = LOADING_MSGS[0];
    updateTimer();
    timerIv = setInterval(updateTimer, 1000);
    msgIv = setInterval(() => {
        const el = $('loadingStatus');
        el.style.opacity = '0';
        setTimeout(() => {
            msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
            el.textContent = LOADING_MSGS[msgIdx];
            el.style.opacity = '1';
        }, 300);
    }, 8000);

    const fd = new FormData();
    fd.append('video', selectedFile);
    fetch(`${API_BASE}/api/v1/analyse`, { method: 'POST', body: fd })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(d => poll(d.job_id))
        .catch(e => { stopTimers(); showError(e.message); });
}

function updateTimer() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const hh = String(Math.floor(s / 3600)).padStart(2, '0');
    const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    $('elapsed').textContent = `${hh}:${mm}:${ss}`;
}

function poll(jobId) {
    pollIv = setInterval(() => {
        fetch(`${API_BASE}/api/v1/jobs/status/${jobId}`)
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(j => {
                if (j.status === 'completed') { stopTimers(); clearInterval(pollIv); render(j.result); }
                else if (j.status === 'failed') { stopTimers(); clearInterval(pollIv); showError(j.error || 'Analysis failed'); }
            })
            .catch(e => console.error('Poll:', e));
    }, 5000);
}

function stopTimers() { clearInterval(timerIv); clearInterval(msgIv); }
function show(...ids) { ids.forEach(id => $(id).style.display = 'block'); }
function hide(...ids) { ids.forEach(id => $(id).style.display = 'none'); }

function showError(msg) {
    hide('loadingSection'); show('errorSection');
    $('errorMessage').textContent = `Analysis failed: ${msg}`;
}

function esc(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ── Tab switching ──
function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        const names = ['overview', 'players', 'analyst'];
        btn.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-pane').forEach(p => {
        p.classList.remove('active');
        p.style.opacity = '0';
    });
    const pane = $('pane-' + name);
    if (pane) {
        pane.classList.add('active');
        requestAnimationFrame(() => { pane.style.opacity = '1'; });
    }
}

// ── Spider chart builder ──
function buildSpiderSVG(t0Scores, t1Scores, labels) {
    const size = 360, cx = size / 2, cy = size / 2, R = 130;
    const n = labels.length;
    const angle = i => (Math.PI * 2 * i / n) - Math.PI / 2;
    const pt = (r, i) => [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];

    const hexPath = (frac) => {
        return Array.from({length: n}, (_, i) => pt(R * frac, i))
            .map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1))
            .join(' ') + ' Z';
    };

    const polyPath = (scores) => {
        return scores.map((s, i) => {
            const r = R * Math.min(100, Math.max(0, s)) / 100;
            const p = pt(r, i);
            return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1);
        }).join(' ') + ' Z';
    };

    let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;

    // Grid hexagons
    [0.33, 0.66, 1.0].forEach(f => {
        svg += `<path d="${hexPath(f)}" fill="none" stroke="#1f2937" stroke-width="1"/>`;
    });
    // Axis lines
    for (let i = 0; i < n; i++) {
        const p = pt(R, i);
        svg += `<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}" stroke="#1f2937" stroke-width="1"/>`;
    }

    // Team polygons
    svg += `<path d="${polyPath(t0Scores)}" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="1.5"/>`;
    svg += `<path d="${polyPath(t1Scores)}" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1.5"/>`;

    // Labels
    labels.forEach((lbl, i) => {
        const p = pt(R * 1.18, i);
        let anchor = 'middle';
        if (p[0] < cx - 10) anchor = 'end';
        else if (p[0] > cx + 10) anchor = 'start';
        svg += `<text x="${p[0].toFixed(1)}" y="${(p[1] + 4).toFixed(1)}" text-anchor="${anchor}" fill="#9ca3af" font-family="Rajdhani,sans-serif" font-size="11" font-weight="600" letter-spacing="1">${esc(lbl)}</text>`;
    });

    svg += '</svg>';
    return svg;
}

// ── Filter players ──
function filterPlayers(team) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.querySelectorAll('.p-card').forEach(c => {
        c.style.display = (team === 'all' || c.dataset.team === team) ? 'block' : 'none';
    });
}

// ── Main render ──
function render(d) {
    hide('loadingSection'); show('resultsSection');

    const brain = d.brain || {};
    const dc = d.data_confidence || {};
    const ts = d.team_separation || {};
    const ph = d.physical || {};
    const vor = d.voronoi || {};
    const sh = d.shape || {};
    const ent = d.entropy || {};
    const fc = d.fatigue_clock || null;
    const traj = d.trajectory || {};
    const rel = (brain.tracking_health || {}).data_reliability || 'medium';
    const t0n = ts.team_0_colour_name || 'Team A';
    const t1n = ts.team_1_colour_name || 'Team B';

    // ── Sort players, assign numbered labels per team ──
    const allPlayers = ph.players || [];
    const t0Players = allPlayers.filter(p => (p.team || '').toLowerCase().includes(t0n.toLowerCase()) || p.team_id === 0 || p.team === '0').sort((a, b) => (b.distance_metres || 0) - (a.distance_metres || 0));
    const t1Players = allPlayers.filter(p => !t0Players.includes(p)).sort((a, b) => (b.distance_metres || 0) - (a.distance_metres || 0));
    // Fallback: split by team colour keywords
    const playerLabels = new Map();
    const assignLabels = (arr, teamName) => arr.forEach((p, i) => playerLabels.set(p.track_id, { label: `PLAYER ${i + 1}`, team: teamName }));

    // Try to figure out team from track data
    const guessTeam = (p) => {
        const t = (p.team || '').toLowerCase();
        if (t.includes('blue') || t.includes(t0n.toLowerCase())) return t0n;
        if (t.includes('red') || t.includes(t1n.toLowerCase())) return t1n;
        return p.team || 'unknown';
    };

    const byTeam = {};
    allPlayers.forEach(p => {
        const team = guessTeam(p);
        if (!byTeam[team]) byTeam[team] = [];
        byTeam[team].push(p);
    });
    Object.keys(byTeam).forEach(team => {
        byTeam[team].sort((a, b) => (b.distance_metres || 0) - (a.distance_metres || 0));
        byTeam[team].forEach((p, i) => playerLabels.set(p.track_id, { label: `PLAYER ${i + 1}`, team }));
    });

    // ── Build fatigue map by track_id ──
    const fatigueMap = new Map();
    if (fc && fc.profiles) {
        fc.profiles.forEach(p => fatigueMap.set(String(p.track_id), p));
    }

    // ── Build trajectory map by track_id ──
    const trajMap = traj.trajectories || {};

    // ──────────────────────────────────────────────────────
    //  TAB 1: MATCH OVERVIEW
    // ──────────────────────────────────────────────────────
    let ov = '';

    // A. Brain Verdict Banner
    const trust = brain.metrics_to_trust || [];
    const question = brain.metrics_to_question || [];
    ov += `<div class="brain-banner brain-${rel}" id="brain">
        <div class="brain-label">Observer Brain</div>
        <div class="brain-verdict">${esc(brain.verdict || 'No verdict available')}</div>
        <div class="brain-pills-row">
            <span class="brain-pills-label">&#10003; Trusted:</span>
            ${trust.map(m => `<span class="metric-pill pill-trust">${esc(m)}</span>`).join('')}
        </div>
        <div class="brain-pills-row">
            <span class="brain-pills-label">~ Approximate:</span>
            ${question.map(m => `<span class="metric-pill pill-question">${esc(m)}</span>`).join('')}
        </div>
    </div>`;

    // B. Match Confidence
    const grade = (dc.overall_grade || 'B').toUpperCase();
    const gc = { A: 'g-a', B: 'g-b', C: 'g-c', D: 'g-d' }[grade] || 'g-b';
    ov += `<div class="conf-row" id="conf">
        <div class="grade-circle ${gc}">${esc(grade)}</div>
        <div>
            <div class="conf-section-label">Match Confidence</div>
            <div class="conf-text">${esc(dc.coach_recommendation || '')}</div>
        </div>
    </div>`;

    // C. Match Flow
    const evts = (d.situations || {}).events || [];
    let openSecs = 0, deadSecs = 0;
    if (evts.length) {
        evts.forEach(e => {
            const dur = e.end_time - e.start_time;
            if (e.situation === 'OPEN_PLAY') openSecs += dur; else deadSecs += dur;
        });
        const total = evts.reduce((s, e) => s + (e.end_time - e.start_time), 0);
        const segs = evts.map(e => {
            const w = ((e.end_time - e.start_time) / total * 100);
            const cls = e.situation === 'OPEN_PLAY' ? 'tl-open' : 'tl-dead';
            const lbl = e.situation === 'OPEN_PLAY' ? 'PLAY' : 'DEAD';
            return `<div class="tl-seg ${cls}" style="width:${w.toFixed(2)}%" title="${e.situation}: ${e.start_time}s–${e.end_time}s">${w > 8 ? lbl : ''}</div>`;
        }).join('');
        const last = evts[evts.length - 1];
        ov += `<div class="card" id="timeline">
            <div class="card-title">Match Flow</div>
            <div class="tl-bar">${segs}</div>
            <div class="tl-times"><span>0s</span><span>${last.end_time}s</span></div>
            <div class="tl-summary">${Math.round(openSecs)}s open play &nbsp;|&nbsp; ${Math.round(deadSecs)}s stopped</div>
        </div>`;
    }

    // D. Pitch Control
    if (vor.status === 'ok') {
        const t0p = vor.team_0_control_pct || 0;
        const t1p = vor.team_1_control_pct || 0;
        const domName = vor.dominant_team === 0 ? t0n : t1n;
        ov += `<div class="card" id="voronoi">
            <div class="card-title">Pitch Control</div>
            <div class="ctrl-nums">
                <div><div class="ctrl-name">${esc(t0n)}</div><div class="ctrl-pct" style="color:var(--teal)">${t0p.toFixed(1)}%</div></div>
                <div><div class="ctrl-name">${esc(t1n)}</div><div class="ctrl-pct" style="color:var(--danger)">${t1p.toFixed(1)}%</div></div>
            </div>
            <div class="ctrl-bar">
                <div class="ctrl-bar-left" style="width:${t0p.toFixed(2)}%"></div>
                <div class="ctrl-bar-right" style="width:${t1p.toFixed(2)}%"></div>
            </div>
            <div class="ctrl-verdict">${esc(domName)} held ${(vor.control_margin || 0).toFixed(1)}% more of the pitch</div>
            <div class="ctrl-frames">${vor.frames_analysed || 0} frames analysed</div>
        </div>`;
    }

    // E. Tactical Shape — Spider chart
    {
        const e0 = ent.team_0 || {};
        const e1 = ent.team_1 || {};
        const s0 = sh.team_0 || {};
        const s1 = sh.team_1 || {};
        const spiderLabels = ['WIDTH', 'DEPTH', 'SPRINT INTENSITY', 'SPACE CONTROL', 'ORGANISATION', 'COMPACTNESS'];
        const voronoiOk = vor.status === 'ok';

        const t0Scores = [
            Math.min(100, ((s0.avg_width_metres || 0) / 68) * 100),
            Math.min(100, ((s0.avg_depth_metres || 0) / 50) * 100),
            Math.min(100, ((ph.total_sprints || 0) / 20) * 100),
            voronoiOk ? (vor.team_0_control_pct || 50) : 50,
            e0.avg_entropy != null ? Math.max(0, 100 - e0.avg_entropy * 100) : 50,
            s0.avg_compactness_metres != null ? Math.max(0, 100 - (s0.avg_compactness_metres / 30) * 100) : 50
        ];
        const t1Scores = [
            Math.min(100, ((s1.avg_width_metres || 0) / 68) * 100),
            Math.min(100, ((s1.avg_depth_metres || 0) / 50) * 100),
            Math.min(100, ((ph.total_sprints || 0) / 20) * 100),
            voronoiOk ? (vor.team_1_control_pct || 50) : 50,
            e1.avg_entropy != null ? Math.max(0, 100 - e1.avg_entropy * 100) : 50,
            s1.avg_compactness_metres != null ? Math.max(0, 100 - (s1.avg_compactness_metres / 30) * 100) : 50
        ];

        const interp0 = (e0.interpretation || '').replace(/entropy/gi, 'organisation score');
        const interp1 = (e1.interpretation || '').replace(/entropy/gi, 'organisation score');

        ov += `<div class="card" id="spider">
            <div class="card-title">Tactical Shape</div>
            <div class="spider-wrap">
                ${buildSpiderSVG(t0Scores, t1Scores, spiderLabels)}
                <div class="spider-legend">
                    <span><span class="spider-dot" style="background:var(--teal)"></span>${esc(t0n)}</span>
                    <span><span class="spider-dot" style="background:var(--danger)"></span>${esc(t1n)}</span>
                </div>
                ${interp0 ? `<div class="spider-interp"><span style="color:var(--teal)">&#11044;</span> ${esc(t0n)}: ${esc(interp0)}<br><span style="color:var(--danger)">&#11044;</span> ${esc(t1n)}: ${esc(interp1)}</div>` : ''}
            </div>
        </div>`;
    }

    // F. Three big numbers
    ov += `<div style="margin-bottom:20px;opacity:0;transform:translateY(12px);transition:opacity 0.4s,transform 0.4s" class="card-anim" id="bignums">
        <div class="big-nums">
            <div class="big-num-box"><div class="big-num">${ph.total_sprints ?? 0}</div><div class="big-num-label">Total Sprints</div></div>
            <div class="big-num-box"><div class="big-num">${ph.max_speed_kmh ? ph.max_speed_kmh.toFixed(1) : '-'}</div><div class="big-num-label">Max Speed km/h</div></div>
            <div class="big-num-box"><div class="big-num">${ph.players_analysed ?? 0}</div><div class="big-num-label">Players Analysed</div></div>
        </div>
    </div>`;

    $('pane-overview').innerHTML = ov;

    // ──────────────────────────────────────────────────────
    //  TAB 2: PLAYERS
    // ──────────────────────────────────────────────────────
    const teamNames = Object.keys(byTeam);
    let pl = '';

    pl += `<div class="filter-bar">
        <button class="filter-pill active" onclick="filterPlayers('all')">ALL</button>
        ${teamNames.map(t => `<button class="filter-pill" onclick="filterPlayers('${esc(t)}')">${esc(t)}</button>`).join('')}
    </div>`;

    const validPlayers = allPlayers.filter(p => !(p.distance_metres === 0 && (p.max_speed_kmh || 0) < 5));

    pl += `<div class="player-grid" id="playerGrid">`;
    validPlayers.forEach(p => {
        const info = playerLabels.get(p.track_id) || { label: `PLAYER ?`, team: p.team || '?' };
        const teamLower = (info.team || '').toLowerCase();
        let badgeCls = 'badge-other';
        if (teamLower.includes('blue')) badgeCls = 'badge-blue';
        else if (teamLower.includes('red')) badgeCls = 'badge-red';
        else if (teamLower === t0n.toLowerCase()) badgeCls = 'badge-blue';
        else if (teamLower === t1n.toLowerCase()) badgeCls = 'badge-red';

        const conf = (p.confidence || 'medium').toLowerCase();
        const confCls = conf === 'high' ? 'conf-high' : conf === 'low' ? 'conf-low' : 'conf-med';
        const confIcon = conf === 'high' ? '&#9670; HIGH' : conf === 'low' ? '&#9670; LOW' : '&#9670; MED';

        const spd = p.max_speed_kmh || 0;
        const pac = spd > 0 ? Math.min(99, Math.round(spd / 45 * 99)) : '--';

        const spdPct = Math.min(100, (spd / 45) * 100);
        const distPct = Math.min(100, ((p.distance_metres || 0) / 400) * 100);
        const sprintPct = Math.min(100, ((p.sprint_count || p.sprints || 0) / 8) * 100);

        const fatigue = fatigueMap.get(String(p.track_id));
        const trajData = trajMap[String(p.track_id)];

        let fatigueHtml = '';
        if (fatigue) {
            const flv = (fatigue.fatigue_label || 'MEDIUM').toUpperCase();
            const fbcls = flv === 'HIGH' ? 'p-bar-red' : flv === 'LOW' ? 'p-bar-teal' : 'p-bar-amber';
            const fscore = fatigue.fatigue_score || 0;
            fatigueHtml = `<div class="p-divider"></div>
                <div class="p-bar-row">
                    <div class="p-bar-label-row"><span class="p-bar-label">FATIGUE</span><span class="p-bar-label">${flv}</span></div>
                    <div class="p-bar-bg"><div class="p-bar-fill ${fbcls}" style="width:${Math.min(fscore,100)}%"></div></div>
                </div>`;
        }

        // Expand content
        let expandHtml = '';
        if (fatigue) {
            const m = fatigue.metrics || {};
            expandHtml += `<div class="expand-label">Fatigue Profile</div>
                <div>Velocity drop: ${m.velocity_ceiling_drop_pct != null ? m.velocity_ceiling_drop_pct.toFixed(1) + '%' : '-'}<br>
                Sprint drift: ${m.sprint_threshold_drift_pct != null ? m.sprint_threshold_drift_pct.toFixed(1) + '%' : '-'}<br>
                Recovery expansion: ${m.recovery_expansion_seconds != null ? m.recovery_expansion_seconds.toFixed(1) + 's' : '-'}<br>
                Predictability: ${m.predictability_score != null ? m.predictability_score.toFixed(0) : '-'}</div>`;
        }
        if (trajData && trajData.status === 'ok') {
            const lbl = trajData.development_label || 'PLATEAUING';
            const lc = { BREAKTHROUGH: '#f59e0b', EMERGING: '#00d4aa', DEVELOPING: '#3b82f6', PLATEAUING: '#6b7280', DECLINING: '#ef4444', FATIGUING: '#f97316' }[lbl] || '#6b7280';
            const cur = trajData.current || {};
            const pred = trajData.predicted_next_match || {};
            const trends = trajData.trends || {};
            const arrowFn = dir => dir === 'improving' ? '&#8593;' : dir === 'declining' ? '&#8595;' : '&#8594;';
            expandHtml += `<div class="expand-label" style="margin-top:10px">Development</div>
                <span class="dev-label-badge" style="background:${lc}22;color:${lc}">${esc(lbl)}</span><br>
                <span>${arrowFn((trends.speed || {}).direction)} Speed: ${cur.avg_speed_kmh != null ? cur.avg_speed_kmh.toFixed(1) : '-'} km/h avg</span><br>
                <span>${arrowFn((trends.sprints || {}).direction)} Sprints: ${cur.avg_sprints != null ? cur.avg_sprints.toFixed(1) : '-'} avg</span><br>
                <span>${arrowFn((trends.distance || {}).direction)} Distance: ${cur.avg_distance_metres != null ? cur.avg_distance_metres.toFixed(0) : '-'}m avg</span>
                <div class="traj-predict-box" style="margin-top:8px">
                    <div style="font-family:Rajdhani,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Predicted Next Match</div>
                    Speed: ${pred.speed_kmh != null ? pred.speed_kmh.toFixed(1) : '-'} km/h &nbsp;&bull;&nbsp; Sprints: ${pred.sprints != null ? pred.sprints : '-'}
                </div>`;
        }

        pl += `<div class="p-card" data-team="${esc(info.team)}" onclick="togglePlayerExpand(this)">
            <div class="p-head">
                <span class="p-title">${esc(info.label)}</span>
                <span class="p-team-badge ${badgeCls}">${esc(info.team)}</span>
                <span class="p-conf-badge ${confCls}">${confIcon}</span>
            </div>
            <div class="p-divider"></div>
            <div class="p-attrs">
                <div class="p-attr"><div class="p-attr-label">PAC</div><div class="p-attr-val">${pac}</div></div>
                <div class="p-attr"><div class="p-attr-label">SHO</div><div class="p-attr-val">--</div></div>
                <div class="p-attr"><div class="p-attr-label">PAS</div><div class="p-attr-val">--</div></div>
                <div class="p-attr"><div class="p-attr-label">DRI</div><div class="p-attr-val">--</div></div>
                <div class="p-attr"><div class="p-attr-label">DEF</div><div class="p-attr-val">--</div></div>
            </div>
            <div class="p-divider"></div>
            <div class="p-stats-rows">
                <div class="p-stat-row"><span class="p-stat-label">TOP SPEED</span><span class="p-stat-val">${p.max_speed_display || (spd > 0 ? spd.toFixed(1) + ' km/h' : '-')}</span></div>
                <div class="p-stat-row"><span class="p-stat-label">DISTANCE</span><span class="p-stat-val">${p.distance_range || (p.distance_metres ? p.distance_metres.toFixed(0) + 'm' : '-')}</span></div>
                <div class="p-stat-row"><span class="p-stat-label">SPRINTS</span><span class="p-stat-val">${p.sprint_count || p.sprints || 0}</span></div>
            </div>
            <div class="p-divider"></div>
            <div class="p-bar-row">
                <div class="p-bar-label-row"><span class="p-bar-label">SPEED</span></div>
                <div class="p-bar-bg"><div class="p-bar-fill p-bar-teal" style="width:${spdPct.toFixed(1)}%"></div></div>
            </div>
            <div class="p-bar-row">
                <div class="p-bar-label-row"><span class="p-bar-label">DISTANCE</span></div>
                <div class="p-bar-bg"><div class="p-bar-fill p-bar-teal" style="width:${distPct.toFixed(1)}%"></div></div>
            </div>
            <div class="p-bar-row">
                <div class="p-bar-label-row"><span class="p-bar-label">SPRINTS</span></div>
                <div class="p-bar-bg"><div class="p-bar-fill p-bar-teal" style="width:${sprintPct.toFixed(1)}%"></div></div>
            </div>
            ${fatigueHtml}
            ${expandHtml ? `<div class="p-expand">${expandHtml}</div>` : ''}
        </div>`;
    });
    pl += '</div>';

    $('pane-players').innerHTML = pl;

    // ──────────────────────────────────────────────────────
    //  TAB 3: ANALYST
    // ──────────────────────────────────────────────────────
    let an = '';

    // A. AI Coaching Report
    an += `<div class="card" id="report">
        <div class="card-title-row">
            <div class="card-title">Coaching Report</div>
            <button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.parentElement.querySelector('.report-text').textContent).then(()=>{this.textContent='COPIED';setTimeout(()=>this.textContent='COPY',1500)})">COPY</button>
        </div>
        <div class="report-text">${esc(d.analysis || 'No report available')}</div>
    </div>`;

    // B. Fatigue Clock
    if (fc && fc.players_analysed > 0) {
        const avgs = fc.team_fatigue_averages || {};
        const akeys = Object.keys(avgs);
        let mostFatigued = '';
        if (fc.most_fatigued_track_id != null) {
            const mfp = fatigueMap.get(String(fc.most_fatigued_track_id));
            const mfLabel = playerLabels.get(fc.most_fatigued_track_id);
            const mfName = mfLabel ? mfLabel.label : `Track #${fc.most_fatigued_track_id}`;
            const mfScore = mfp ? mfp.fatigue_score : '?';
            mostFatigued = `<div class="most-fatigued-box">Most fatigued: ${esc(mfName)} &mdash; score ${mfScore}/100</div>`;
        }

        let teamBars = '';
        akeys.forEach(k => {
            const v = avgs[k];
            const name = k === '0' ? t0n : t1n;
            const col = v > 60 ? 'var(--danger)' : v > 40 ? 'var(--warning)' : 'var(--teal)';
            const lv = v > 60 ? 'HIGH' : v > 40 ? 'MEDIUM' : 'LOW';
            teamBars += `<div class="fatigue-team">
                <div class="fatigue-team-label">${esc(name)}</div>
                <div class="fatigue-bar-bg"><div class="fatigue-bar-fill" style="width:${Math.min(v, 100)}%;background:${col}"></div></div>
                <div class="fatigue-val" style="color:${col}">${v.toFixed(1)}</div>
                <div class="fatigue-lv" style="color:${col}">${lv}</div>
            </div>`;
        });

        let playerCards = '';
        (fc.profiles || []).forEach(p => {
            const isTop = p.track_id === fc.most_fatigued_track_id;
            const lbl = (p.fatigue_label || 'MEDIUM').toUpperCase();
            const col = lbl === 'HIGH' ? 'var(--danger)' : lbl === 'LOW' ? 'var(--teal)' : 'var(--warning)';
            const m = p.metrics || {};
            const pLabel = playerLabels.get(p.track_id);
            const displayName = pLabel ? pLabel.label : `Track #${p.track_id}`;
            playerCards += `<div class="fatigue-p-card${isTop ? ' highlight' : ''}">
                <div class="fp-header">
                    <span class="fp-id">${esc(displayName)}</span>
                    <span class="fatigue-lv" style="color:${col}">&#9670; ${lbl}</span>
                </div>
                <div class="fp-score" style="color:${col}">${p.fatigue_score ?? '-'}</div>
                <div class="p-bar-bg" style="margin-bottom:8px"><div class="p-bar-fill" style="width:${Math.min(p.fatigue_score||0,100)}%;background:${col}"></div></div>
                <div class="fp-metrics">
                    Velocity drop: <span>${m.velocity_ceiling_drop_pct != null ? m.velocity_ceiling_drop_pct.toFixed(1) + '%' : '-'}</span><br>
                    Sprint drift: <span>${m.sprint_threshold_drift_pct != null ? m.sprint_threshold_drift_pct.toFixed(1) + '%' : '-'}</span><br>
                    Recovery: <span>${m.recovery_expansion_seconds != null ? m.recovery_expansion_seconds.toFixed(1) + 's' : '-'}</span><br>
                    Predictability: <span>${m.predictability_score != null ? m.predictability_score.toFixed(0) : '-'}</span>
                </div>
            </div>`;
        });

        an += `<div class="card" id="fatigue">
            <div class="card-title">&#9201; Fatigue Clock</div>
            ${akeys.length ? `<div class="fatigue-teams">${teamBars}</div>` : ''}
            ${mostFatigued}
            ${playerCards ? `<button class="fatigue-toggle-btn" onclick="const g=this.nextElementSibling;g.classList.toggle('open');this.textContent=g.classList.contains('open')?'Hide players &#9650;':'Show all players &#9660;'">Show all players &#9660;</button>
            <div class="fatigue-player-grid">${playerCards}</div>` : ''}
        </div>`;
    }

    // C. Development Trajectory
    {
        const trajKeys = Object.keys(trajMap).filter(k => trajMap[k].status === 'ok');
        const labelColors = { BREAKTHROUGH: '#f59e0b', EMERGING: '#00d4aa', DEVELOPING: '#3b82f6', PLATEAUING: '#6b7280', DECLINING: '#ef4444', FATIGUING: '#f97316' };
        const arrowFn = dir => dir === 'improving' ? '&#8593;' : dir === 'declining' ? '&#8595;' : '&#8594;';

        let trajContent = '';
        if (!trajKeys.length) {
            trajContent = '<div class="traj-empty">Upload more clips featuring the same players to unlock development tracking.</div>';
        } else {
            trajContent = '<div class="traj-grid">';
            trajKeys.forEach(k => {
                const p = trajMap[k];
                const lbl = p.development_label || 'PLATEAUING';
                const lc = labelColors[lbl] || '#6b7280';
                const cur = p.current || {};
                const pred = p.predicted_next_match || {};
                const trends = p.trends || {};
                const pLabel = playerLabels.get(parseInt(k));
                const displayName = pLabel ? pLabel.label : `Player #${esc(p.player_id || k)}`;
                trajContent += `<div class="traj-card">
                    <div class="traj-header">
                        <span class="traj-pid">${esc(displayName)}</span>
                        <span class="dev-label-badge" style="background:${lc}22;color:${lc}">${esc(lbl)}</span>
                    </div>
                    <div class="traj-rows">
                        <span class="traj-arrow">${arrowFn((trends.speed || {}).direction)}</span> Speed: ${cur.avg_speed_kmh != null ? cur.avg_speed_kmh.toFixed(1) : '-'} km/h avg<br>
                        <span class="traj-arrow">${arrowFn((trends.sprints || {}).direction)}</span> Sprints: ${cur.avg_sprints != null ? cur.avg_sprints.toFixed(1) : '-'} per match avg<br>
                        <span class="traj-arrow">${arrowFn((trends.distance || {}).direction)}</span> Distance: ${cur.avg_distance_metres != null ? cur.avg_distance_metres.toFixed(0) : '-'}m avg
                    </div>
                    <div class="traj-predict">
                        <div class="traj-predict-title">Predicted next match</div>
                        Speed: ${pred.speed_kmh != null ? pred.speed_kmh.toFixed(1) : '-'} km/h &nbsp;&bull;&nbsp; Sprints: ${pred.sprints != null ? pred.sprints : '-'}
                        ${pred.distance_metres != null ? ` &nbsp;&bull;&nbsp; Distance: ${pred.distance_metres.toFixed(0)}m` : ''}
                    </div>
                    <div class="traj-consistency">Consistency: <span>${p.consistency_score != null ? p.consistency_score.toFixed(1) : '-'}/100</span></div>
                    ${p.trajectory_report ? `<button class="traj-report-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'Hide Report &#9650;':'Development Report &#9660;'">Development Report &#9660;</button>
                    <div class="traj-report-body">${esc(p.trajectory_report)}</div>` : ''}
                </div>`;
            });
            trajContent += '</div>';
        }
        an += `<div class="card" id="trajectory">
            <div class="card-title">&#128200; Development Trajectory</div>
            ${trajContent}
        </div>`;
    }

    // D. Data Quality & Corrections
    {
        const anomalies = brain.anomalies_summary || '';
        const corrections = d.corrections_applied || {};
        const th = brain.tracking_health || {};
        const corrHtml = Object.entries(corrections).length
            ? Object.entries(corrections).map(([k, v]) => `${esc(k.replace(/_/g, ' '))}: ${esc(String(v))}`).join('<br>')
            : 'None';
        an += `<div class="card" id="dq">
            <div class="dq-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.dq-arrow').classList.toggle('open')">
                <div class="dq-title">Data Quality &amp; Corrections</div>
                <div class="dq-arrow">&#9660;</div>
            </div>
            <div class="dq-body">
                <div class="dq-sub"><div class="dq-sub-title">Corrections Applied</div><div class="dq-sub-items">${corrHtml}</div></div>
                <div class="dq-sub"><div class="dq-sub-title">Trusted Metrics</div>
                    <div class="dq-sub-items">${trust.length ? trust.map(t => '&bull; ' + esc(t)).join('<br>') : 'None specified'}</div></div>
                <div class="dq-sub"><div class="dq-sub-title">Metrics to Question</div>
                    <div class="dq-sub-items">${question.length ? question.map(t => '&bull; ' + esc(t)).join('<br>') : 'None'}</div></div>
                ${th.camera_cuts_detected != null ? `<div class="dq-sub"><div class="dq-sub-title">Tracking Health</div>
                    <div class="dq-sub-items">Camera cuts detected: ${esc(String(th.camera_cuts_detected))}<br>Total anomalies: ${esc(String(th.total_anomalies || 0))}</div></div>` : ''}
                ${anomalies ? `<div class="dq-sub"><div class="dq-sub-title">Anomalies Summary</div><div class="dq-sub-items">${esc(anomalies)}</div></div>` : ''}
            </div>
        </div>`;
    }

    $('pane-analyst').innerHTML = an;

    // ── Animate cards in (staggered) ──
    const allCards = document.querySelectorAll('#resultsSection .card, #resultsSection .brain-banner, #resultsSection .conf-row, #resultsSection #bignums');
    allCards.forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(12px)';
        el.style.transition = 'opacity 0.4s, transform 0.4s';
        setTimeout(() => {
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
            el.classList.add('visible');
        }, i * 80);
    });
}

function togglePlayerExpand(card) {
    const exp = card.querySelector('.p-expand');
    if (!exp) return;
    exp.classList.toggle('open');
    card.classList.toggle('expanded');
}

// ═══════════════════════════════════════════════════════
//  LIVE ANALYSIS
// ═══════════════════════════════════════════════════════

let liveSessionId = null;
let liveTracks = {};
let liveConfirmedCount = 0;
let liveUncertainCount = 0;
let livePaused = false;
let liveStartTime = null;
let liveTimerIv = null;
let liveSkippedIds = new Set();
let liveSeenTrackIds = new Set();   // tracks already shown as cards
let uncertainQueue = [];
let liveOverlayIv = null;           // animation loop for overlay
const MAX_VISIBLE_CARDS = 3;
const UNCERTAIN_BATCH_THRESHOLD = 5; // only pause after this many new uncertain in one batch

async function startLiveAnalysis() {
    hide('uploadSection', 'resultsSection', 'errorSection', 'loadingSection');
    show('liveSection');

    const video = $('liveVideo');
    const url = URL.createObjectURL(selectedFile);
    video.src = url;

    try {
        await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Video load timeout')), 10000);
            video.onloadedmetadata = () => { clearTimeout(timeout); resolve(); };
            video.onerror = (e) => { clearTimeout(timeout); reject(e); };
        });
    } catch (e) {
        fallbackToQuick('Video load failed: ' + (e.message || 'unknown'));
        return;
    }

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const duration = video.duration;
    if (!duration || !vw || !vh) { fallbackToQuick('Invalid video'); return; }

    // Use 5fps for speed — still enough for tracking
    const fps = 5;
    const interval = 1 / fps;
    const totalFrames = Math.floor(duration * fps);
    const batchSize = 25;

    // Start session
    try {
        const startFd = new FormData();
        startFd.append('video', selectedFile);
        startFd.append('frame_width', vw);
        startFd.append('frame_height', vh);
        startFd.append('clip_type', 'match');
        startFd.append('fps', fps);
        const res = await fetch(`${API_BASE}/api/v1/stream/start`, {
            method: 'POST', body: startFd
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        liveSessionId = data.session_id;
    } catch (e) {
        fallbackToQuick('Session start failed: ' + (e.message || 'unknown'));
        return;
    }

    // Setup overlay canvas
    const canvas = $('liveCanvas');
    const videoEl = $('liveVideo');
    const syncCanvas = () => {
        canvas.width = videoEl.clientWidth;
        canvas.height = videoEl.clientHeight;
    };
    syncCanvas();
    new ResizeObserver(syncCanvas).observe(videoEl);

    // Play the video so user can actually watch it
    video.currentTime = 0;
    video.play().catch(() => {});

    // Continuously redraw overlay at 15fps while live section is visible
    liveOverlayIv = setInterval(drawLiveOverlay, 67);

    // Extraction canvas (offscreen, half-res for speed)
    const extractW = Math.min(vw, 640);
    const extractH = Math.round(vh * (extractW / vw));
    const extractCanvas = document.createElement('canvas');
    extractCanvas.width = extractW;
    extractCanvas.height = extractH;
    const ectx = extractCanvas.getContext('2d');

    liveStartTime = Date.now();
    liveTimerIv = setInterval(updateLiveTimer, 1000);
    liveConfirmedCount = 0;
    liveUncertainCount = 0;
    liveTracks = {};
    liveSkippedIds = new Set();
    liveSeenTrackIds = new Set();
    uncertainQueue = [];

    // Extract frames — seek offscreen, don't interrupt playback visually
    // We use a second hidden video for extraction so the visible one plays smoothly
    const extractVideo = document.createElement('video');
    extractVideo.src = url;
    extractVideo.muted = true;
    extractVideo.preload = 'auto';
    await new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Extract video timeout')), 10000);
        extractVideo.onloadedmetadata = () => { clearTimeout(t); resolve(); };
        extractVideo.onerror = (e) => { clearTimeout(t); reject(e); };
    });

    let frameIdx = 0;
    let batch = [];
    let batchIndices = [];
    let batchTimestamps = [];

    while (frameIdx < totalFrames) {
        // Wait if paused
        while (livePaused) await sleep(200);

        const t = frameIdx * interval;
        extractVideo.currentTime = t;
        await new Promise(r => { extractVideo.onseeked = r; });

        ectx.drawImage(extractVideo, 0, 0, extractW, extractH);
        const blob = await new Promise(r => extractCanvas.toBlob(r, 'image/jpeg', 0.6));

        batch.push(blob);
        batchIndices.push(frameIdx);
        batchTimestamps.push(parseFloat(t.toFixed(3)));
        frameIdx++;

        // Update progress
        const pct = (frameIdx / totalFrames * 100).toFixed(1);
        $('liveProgressFill').style.width = pct + '%';
        $('liveFrameInfo').textContent = `Frame ${frameIdx}/${totalFrames}`;

        if (batch.length >= batchSize || frameIdx >= totalFrames) {
            try {
                const fd = new FormData();
                batch.forEach(b => fd.append('frames', b, 'frame.jpg'));
                fd.append('frame_indices', JSON.stringify(batchIndices));
                fd.append('timestamps', JSON.stringify(batchTimestamps));

                const res = await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/frames`, {
                    method: 'POST', body: fd
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const result = await res.json();

                // Update tracks from track_states
                if (result.track_states) {
                    result.track_states.forEach(tk => { liveTracks[tk.track_id] = tk; });
                }

                // Handle newly confirmed tracks (just hit detection threshold)
                if (result.newly_confirmed && result.newly_confirmed.length > 0) {
                    const fresh = result.newly_confirmed.filter(u =>
                        !liveSkippedIds.has(u.track_id) && !liveSeenTrackIds.has(u.track_id)
                    );
                    fresh.forEach(u => liveSeenTrackIds.add(u.track_id));
                    if (fresh.length > 0) {
                        uncertainQueue.push(...fresh);
                        liveUncertainCount += fresh.length;
                        if (fresh.length >= UNCERTAIN_BATCH_THRESHOLD || uncertainQueue.length >= UNCERTAIN_BATCH_THRESHOLD) {
                            livePaused = true;
                            showUncertainCards();
                        }
                    }
                }

                updateLivePlayerInfo();
            } catch (e) {
                console.error('Frame batch error:', e);
                // Don't fallback on single batch failure — skip and continue
            }
            batch = [];
            batchIndices = [];
            batchTimestamps = [];
        }
    }

    // Show any remaining uncertain cards before finalising
    if (uncertainQueue.length > 0) {
        livePaused = true;
        showUncertainCards();
        while (livePaused) await sleep(200);
    }

    // Finalise — first get stream summary, then submit to full pipeline
    clearInterval(liveTimerIv);
    clearInterval(liveOverlayIv);
    video.pause();
    $('liveFrameInfo').textContent = 'Finalising stream...';

    try {
        // Finalise triggers real pipeline on server-side saved video
        const finRes = await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/finalise`, {
            method: 'POST',
        });
        if (!finRes.ok) throw new Error(`HTTP ${finRes.status}`);
        const finData = await finRes.json();

        hide('liveSection');
        show('loadingSection');
        startTime = Date.now();
        $('loadingStatus').textContent = 'RUNNING FULL ANALYSIS PIPELINE...';
        updateTimer();
        timerIv = setInterval(updateTimer, 1000);

        poll(finData.job_id);
    } catch (e) {
        fallbackToQuick('Finalise failed: ' + (e.message || 'unknown'));
    }
}

function fallbackToQuick(reason) {
    console.warn('Live fallback:', reason);
    clearInterval(liveTimerIv);
    clearInterval(liveOverlayIv);
    hide('liveSection');
    liveSessionId = null;
    analysisMode = 'quick';
    alert('Live analysis unavailable — switching to quick analysis.\n\n' + reason);
    startAnalysis();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateLiveTimer() {
    if (!liveStartTime) return;
    const s = Math.floor((Date.now() - liveStartTime) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    $('liveElapsed').textContent = `${mm}:${ss}`;
}

function updateLivePlayerInfo() {
    $('livePlayerInfo').textContent = `${liveConfirmedCount} confirmed \u00b7 ${liveUncertainCount} uncertain`;
}

function drawLiveOverlay() {
    const canvas = $('liveCanvas');
    const video = $('liveVideo');
    if (!canvas || !video || !video.videoWidth) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const scaleX = canvas.width / video.videoWidth;
    const scaleY = canvas.height / video.videoHeight;

    Object.values(liveTracks).forEach(tk => {
        if (!tk.bbox) return;
        const [x1, y1, x2, y2] = tk.bbox;
        const sx = x1 * scaleX, sy = y1 * scaleY;
        const sw = (x2 - x1) * scaleX, sh = (y2 - y1) * scaleY;
        const cx = sx + sw / 2, cy = sy;

        let color;
        if (tk.coach_confirmed || tk.coach_label) {
            color = '#00d4aa';
        } else if (liveSkippedIds.has(tk.track_id)) {
            color = '#6b7280';
        } else if (tk.state === 'lost') {
            color = '#f59e0b';
        } else {
            color = '#38bdf8';
        }

        // Glow effect
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;

        // Thicker box
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.strokeRect(sx, sy, sw, sh);

        // Dot above head
        ctx.beginPath();
        ctx.arc(cx, cy - 6, 6, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        ctx.shadowBlur = 0;

        // Label
        const label = tk.coach_label || '';
        if (label) {
            ctx.font = '700 13px Rajdhani, sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            // Background pill
            const tw = ctx.measureText(label).width + 8;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(cx - tw/2, sy - 24, tw, 16, 4);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillText(label, cx, sy - 12);
        }
    });
}

function showUncertainCards() {
    const stack = $('uncertainStack');
    stack.innerHTML = '';
    const visible = uncertainQueue.splice(0, MAX_VISIBLE_CARDS);

    visible.forEach(u => {
        const card = document.createElement('div');
        card.className = 'uncertain-card';
        card.dataset.trackId = u.track_id;

        // crop_b64 is the field name from the API
        const cropSrc = u.crop_b64 ? `data:image/jpeg;base64,${u.crop_b64}` : '';
        const teamLabel = u.team_colour === 0 ? 'Blue' : u.team_colour === 1 ? 'Red' : 'Unknown';

        card.innerHTML = `
            ${cropSrc ? `<img class="uc-crop" src="${cropSrc}" alt="player crop">` : '<div class="uc-crop"></div>'}
            <div class="uc-info">
                <div class="uc-title">New player detected</div>
                <div class="uc-team">Team: ${esc(teamLabel)}</div>
                <div class="uc-fields">
                    <input type="text" placeholder="Jersey #" class="uc-jersey" maxlength="3">
                    <input type="text" placeholder="Player name" class="uc-name">
                </div>
                <div class="uc-actions">
                    <button class="uc-confirm-btn" onclick="confirmUncertain(${u.track_id}, this)">Confirm</button>
                    <button class="uc-skip-btn" onclick="skipUncertain(${u.track_id}, this)">Skip</button>
                </div>
                <div class="uc-timer-bar"><div class="uc-timer-fill" style="width:100%"></div></div>
            </div>
        `;
        stack.appendChild(card);

        // 15s auto-skip (was 30s, too long)
        const fill = card.querySelector('.uc-timer-fill');
        let elapsed = 0;
        const tmr = setInterval(() => {
            elapsed += 500;
            const pct = Math.max(0, 100 - (elapsed / 15000 * 100));
            fill.style.width = pct + '%';
            if (elapsed >= 15000) {
                clearInterval(tmr);
                skipUncertain(u.track_id, card.querySelector('.uc-skip-btn'));
            }
        }, 500);
        card._timerIv = tmr;
    });
}

async function confirmUncertain(trackId, btn) {
    const card = btn.closest('.uncertain-card');
    clearInterval(card._timerIv);
    const jersey = card.querySelector('.uc-jersey').value.trim();
    const name = card.querySelector('.uc-name').value.trim();

    // Send as FormData since the endpoint uses Form(...)
    try {
        const fd = new FormData();
        fd.append('track_id', trackId);
        fd.append('jersey_number', jersey || '');
        fd.append('player_name', name || '');
        fd.append('team_colour', '');
        await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/confirm`, {
            method: 'POST', body: fd
        });
    } catch (e) { /* continue anyway */ }

    if (liveTracks[trackId]) {
        liveTracks[trackId].coach_confirmed = true;
        liveTracks[trackId].coach_label = jersey ? `#${jersey}` : (name || 'Confirmed');
        liveTracks[trackId].state = 'confirmed';
    }
    liveConfirmedCount++;
    liveUncertainCount = Math.max(0, liveUncertainCount - 1);
    updateLivePlayerInfo();
    card.remove();
    checkResumeLive();
}

function skipUncertain(trackId, btn) {
    const card = btn.closest('.uncertain-card');
    if (!card) return;
    clearInterval(card._timerIv);
    liveSkippedIds.add(trackId);
    liveUncertainCount = Math.max(0, liveUncertainCount - 1);
    updateLivePlayerInfo();
    card.remove();
    checkResumeLive();
}

function checkResumeLive() {
    const stack = $('uncertainStack');
    if (stack.children.length === 0) {
        if (uncertainQueue.length > 0) {
            showUncertainCards();
        } else {
            livePaused = false;
        }
    }
}
</script>
