<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHLINK CV - Elite Football Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #f9fafb;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }

        /* Header */
        header { padding: 0 0 32px; margin-bottom: 40px; border-bottom: 1px solid #1f2937; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; font-family: 'Inter', monospace; }
        .tagline { font-size: 13px; color: #6b7280; margin-top: 4px; letter-spacing: 0.3px; }

        /* Upload */
        .upload-section { text-align: center; padding: 40px 0; }
        .upload-zone {
            border: 2px dashed #1f2937;
            border-radius: 16px;
            padding: 80px 40px;
            background: #111827;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 600px;
            margin: 0 auto 24px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.05);
        }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-text { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .upload-subtext { font-size: 13px; color: #6b7280; }
        .file-info {
            margin: 20px auto; padding: 12px 16px; background: #111827;
            border: 1px solid #1f2937; border-radius: 8px;
            display: none; font-size: 14px; color: #9ca3af; max-width: 600px;
        }
        .analyse-btn {
            background: #3b82f6; color: #fff; border: none;
            padding: 14px 0; font-size: 15px; font-weight: 600;
            border-radius: 10px; cursor: pointer; transition: all 0.3s;
            display: none; width: 100%; max-width: 600px;
        }
        .analyse-btn:hover { background: #2563eb; }
        input[type="file"] { display: none; }

        /* Loading */
        .loading-section { text-align: center; padding: 80px 20px; display: none; }
        .progress-bar-wrap {
            max-width: 400px; height: 4px; background: #1f2937;
            border-radius: 2px; margin: 0 auto 24px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: #3b82f6; border-radius: 2px;
            animation: pulse-bar 2s ease-in-out infinite;
        }
        @keyframes pulse-bar { 0%,100%{width:15%} 50%{width:70%} }
        .loading-status { font-size: 16px; font-weight: 600; margin-bottom: 6px; min-height: 24px; }
        .elapsed { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
        .cancel-btn {
            background: transparent; color: #6b7280; border: 1px solid #1f2937;
            padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        .cancel-btn:hover { border-color: #374151; color: #9ca3af; }

        /* Cards */
        .card {
            background: #111827; border: 1px solid #1f2937;
            border-radius: 12px; padding: 28px; margin-bottom: 24px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card-title {
            font-size: 11px; color: #6b7280; text-transform: uppercase;
            letter-spacing: 1px; font-weight: 700; margin-bottom: 16px;
        }

        /* Brain Verdict Banner */
        .brain-banner {
            border-radius: 12px; padding: 20px 24px; margin-bottom: 24px;
            font-size: 14px; line-height: 1.7;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
        }
        .brain-banner.visible { opacity: 1; transform: translateY(0); }
        .brain-high { background: rgba(16,185,129,0.12); border: 1px solid #10b981; color: #6ee7b7; }
        .brain-medium { background: rgba(245,158,11,0.12); border: 1px solid #f59e0b; color: #fcd34d; }
        .brain-low { background: rgba(239,68,68,0.12); border: 1px solid #ef4444; color: #fca5a5; }
        .brain-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

        /* Confidence Badge */
        .conf-badge { text-align: center; margin-bottom: 24px;
            opacity: 0; transform: translateY(12px); transition: opacity 0.4s, transform 0.4s; }
        .conf-badge.visible { opacity: 1; transform: translateY(0); }
        .grade-circle {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 800; margin: 0 auto 14px; color: #fff;
        }
        .g-a { background: rgba(16,185,129,0.15); border: 2px solid #10b981; }
        .g-b { background: rgba(59,130,246,0.15); border: 2px solid #3b82f6; }
        .g-c { background: rgba(245,158,11,0.15); border: 2px solid #f59e0b; }
        .g-d { background: rgba(239,68,68,0.15); border: 2px solid #ef4444; }
        .conf-rec { font-size: 13px; color: #9ca3af; max-width: 480px; margin: 0 auto; }

        /* AI Report */
        .report-wrap { position: relative; }
        .report-text { font-size: 14px; line-height: 1.8; color: #d1d5db; white-space: pre-wrap; word-break: break-word; }
        .copy-btn {
            position: absolute; top: 0; right: 0; background: #1f2937;
            border: 1px solid #374151; color: #9ca3af; padding: 6px 14px;
            border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 600;
        }
        .copy-btn:hover { background: #374151; color: #f9fafb; }

        /* Fatigue Clock */
        .fatigue-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .fatigue-team { text-align: center; }
        .fatigue-team-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .fatigue-bar-bg { height: 10px; background: #1f2937; border-radius: 5px; overflow: hidden; }
        .fatigue-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s; }
        .fatigue-val { font-size: 22px; font-weight: 700; margin-top: 6px; }
        .fatigue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 12px; }
        .fatigue-player {
            background: #0a0e1a; border: 1px solid #1f2937; border-radius: 8px; padding: 14px;
        }
        .fatigue-player.highlight { border-color: #ef4444; }
        .fp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .fp-id { font-weight: 700; font-size: 14px; }
        .pill {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
        .pill-high { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .pill-medium { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .pill-low { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .fp-score { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .fp-metrics { font-size: 11px; color: #6b7280; line-height: 1.8; }
        .fp-metrics span { color: #d1d5db; font-weight: 600; }
        .fatigue-conf { text-align: right; margin-top: 12px; }

        /* Shape */
        .shape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
        .shape-team { text-align: center; }
        .shape-label { font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .shape-count { font-size: 12px; color: #4b5563; margin-bottom: 8px; }
        .shape-val { font-size: 32px; font-weight: 800; }

        /* Physical */
        .phys-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; text-align: center; }
        .phys-num { font-size: 28px; font-weight: 800; }
        .phys-label { font-size: 11px; color: #6b7280; text-transform: uppercase; margin-top: 4px; font-weight: 600; }

        /* Timeline */
        .tl-bar { display: flex; height: 36px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; background: #1f2937; }
        .tl-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
        .tl-open { background: rgba(59,130,246,0.5); color: #93c5fd; }
        .tl-dead { background: rgba(75,85,99,0.5); color: #9ca3af; }
        .tl-times { display: flex; justify-content: space-between; font-size: 11px; color: #4b5563; }
        .tl-legend { display: flex; gap: 20px; font-size: 12px; color: #6b7280; margin-top: 8px; }
        .tl-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; }

        /* Player Cards */
        .p-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 12px; }
        .p-card { background: #0a0e1a; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; }
        .p-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .p-id { font-weight: 700; font-size: 14px; }
        .p-badge {
            padding: 3px 10px; border-radius: 12px; font-size: 10px;
            font-weight: 700; text-transform: uppercase;
        }
        .b-red { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .b-blue { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .b-other { background: rgba(75,85,99,0.2); color: #d1d5db; }
        .p-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .p-stat-label { color: #6b7280; }
        .p-stat-val { color: #d1d5db; font-weight: 600; }

        /* Data Quality */
        .dq-toggle { display: flex; align-items: center; cursor: pointer; margin-bottom: 12px; }
        .dq-title { flex: 1; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .dq-arrow { font-size: 10px; color: #6b7280; transition: transform 0.3s; }
        .dq-arrow.open { transform: rotate(180deg); }
        .dq-body { display: none; background: #0a0e1a; border-radius: 8px; padding: 20px; }
        .dq-body.open { display: block; }
        .dq-sub { margin-bottom: 14px; }
        .dq-sub:last-child { margin-bottom: 0; }
        .dq-sub-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .dq-sub-items { font-size: 12px; color: #9ca3af; line-height: 1.7; }

        /* Error */
        .error-section { text-align: center; padding: 80px 20px; display: none; }
        .error-box {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 24px; color: #fca5a5; max-width: 500px;
            margin: 0 auto 20px; font-size: 14px;
        }
        .retry-btn {
            background: rgba(239,68,68,0.15); color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3); padding: 10px 24px;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* Footer */
        footer { text-align: center; padding: 40px 0 20px; font-size: 12px; color: #374151; }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 20px 16px; }
            .upload-zone { padding: 48px 20px; }
            .shape-grid, .fatigue-teams { grid-template-columns: 1fr; }
            .phys-grid { grid-template-columns: 1fr; gap: 16px; }
            .p-grid, .fatigue-grid { grid-template-columns: 1fr; }
        }

        .results-section { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ATHLINK CV</div>
            <div class="tagline">Elite Analysis. Any Match. 90 Seconds.</div>
        </header>

        <main>
            <section class="upload-section" id="uploadSection">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">&#127909;</div>
                    <div class="upload-text">Drop match footage here</div>
                    <div class="upload-subtext">or click to browse — MP4, MOV, AVI</div>
                </div>
                <input type="file" id="fileInput" accept="video/*">
                <div class="file-info" id="fileInfo"><span id="fileName"></span></div>
                <button class="analyse-btn" id="analyseBtn">Analyse Match</button>
            </section>

            <section class="loading-section" id="loadingSection">
                <div class="progress-bar-wrap"><div class="progress-bar"></div></div>
                <div class="loading-status" id="loadingStatus">Tracking players across frames...</div>
                <div class="elapsed" id="elapsed">Analysing... 00:00</div>
                <button class="cancel-btn" id="cancelBtn">Cancel</button>
            </section>

            <section class="results-section" id="resultsSection"></section>

            <section class="error-section" id="errorSection">
                <div class="error-box" id="errorMessage">Analysis failed.</div>
                <button class="retry-btn" onclick="location.reload()">Try Again</button>
            </section>
        </main>

        <footer>Powered by Athlink CV</footer>
    </div>

<script>
const $ = id => document.getElementById(id);
const API_BASE = 'https://web-production-6b7ca.up.railway.app';

const LOADING_MSGS = [
    "Tracking players across frames...",
    "Detecting sprints and measuring speed...",
    "Mapping team shape and width...",
    "Running Observer Brain analysis...",
    "Detecting fatigue signatures...",
    "Generating coaching report..."
];

let msgIdx = 0, startTime, timerIv, msgIv, pollIv;
let selectedFile = null;

// Upload
const zone = $('uploadZone'), fInput = $('fileInput');
zone.addEventListener('click', () => fInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) pickFile(e.dataTransfer.files[0]);
});
fInput.addEventListener('change', e => { if (e.target.files.length) pickFile(e.target.files[0]); });

function pickFile(f) {
    if (!f.type.startsWith('video/')) return alert('Please select a video file');
    selectedFile = f;
    $('fileName').textContent = f.name;
    $('fileInfo').style.display = 'block';
    $('analyseBtn').style.display = 'block';
}

$('analyseBtn').addEventListener('click', startAnalysis);
$('cancelBtn').addEventListener('click', () => {
    clearInterval(pollIv); clearInterval(timerIv); clearInterval(msgIv);
    $('loadingSection').style.display = 'none';
    $('uploadSection').style.display = 'block';
});

function startAnalysis() {
    if (!selectedFile) return;
    show('loadingSection'); hide('uploadSection','resultsSection','errorSection');

    msgIdx = 0; startTime = Date.now();
    $('loadingStatus').textContent = LOADING_MSGS[0];
    updateTimer();
    timerIv = setInterval(updateTimer, 1000);
    msgIv = setInterval(() => {
        msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
        $('loadingStatus').textContent = LOADING_MSGS[msgIdx];
    }, 8000);

    const fd = new FormData();
    fd.append('video', selectedFile);
    fetch(`${API_BASE}/api/v1/analyse`, { method: 'POST', body: fd })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(d => poll(d.job_id))
        .catch(e => { stopTimers(); showError(e.message); });
}

function updateTimer() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    $('elapsed').textContent = `Analysing... ${mm}:${ss}`;
}

function poll(jobId) {
    pollIv = setInterval(() => {
        fetch(`${API_BASE}/api/v1/jobs/status/${jobId}`)
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(j => {
                if (j.status === 'completed') { stopTimers(); clearInterval(pollIv); render(j.result); }
                else if (j.status === 'failed') { stopTimers(); clearInterval(pollIv); showError(j.error || 'Analysis failed'); }
            })
            .catch(e => console.error('Poll:', e));
    }, 5000);
}

function stopTimers() { clearInterval(timerIv); clearInterval(msgIv); }
function show(...ids) { ids.forEach(id => $(id).style.display = 'block'); }
function hide(...ids) { ids.forEach(id => $(id).style.display = 'none'); }

function showError(msg) {
    hide('loadingSection'); show('errorSection');
    $('errorMessage').textContent = `Analysis failed: ${msg}`;
}

function esc(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function render(d) {
    hide('loadingSection'); show('resultsSection');
    const sec = $('resultsSection');
    sec.innerHTML = '';
    const parts = [];

    // A. Brain Verdict
    const brain = d.brain || {};
    const rel = (brain.tracking_health || {}).data_reliability || 'medium';
    parts.push(`<div class="brain-banner brain-${rel}" id="brain">
        <div class="brain-label">Observer Brain</div>
        ${esc(brain.verdict || 'No verdict available')}
    </div>`);

    // B. Confidence Badge
    const dc = d.data_confidence || {};
    const grade = (dc.overall_grade || 'B').toUpperCase();
    const gc = {A:'g-a',B:'g-b',C:'g-c',D:'g-d'}[grade] || 'g-b';
    parts.push(`<div class="conf-badge" id="conf">
        <div class="grade-circle ${gc}">${grade}</div>
        <div class="conf-rec">${esc(dc.coach_recommendation || '')}</div>
    </div>`);

    // C. AI Coaching Report
    parts.push(`<div class="card" id="report"><div class="card-title">AI Coaching Report</div>
        <div class="report-wrap">
            <button class="copy-btn" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy report',1500)})">Copy report</button>
            <div class="report-text">${esc(d.analysis || 'No report available')}</div>
        </div>
    </div>`);

    // D. Fatigue Clock
    const fc = d.fatigue_clock;
    if (fc) {
        let fcHtml = `<div class="card" id="fatigue"><div class="card-title">Fatigue Clock</div>`;
        const avgs = fc.team_fatigue_averages || {};
        const keys = Object.keys(avgs);
        if (keys.length) {
            const ts = d.team_separation || {};
            fcHtml += '<div class="fatigue-teams">';
            keys.forEach(k => {
                const v = avgs[k];
                const name = k === '0' ? (ts.team_0_colour_name||'Team A') : (ts.team_1_colour_name||'Team B');
                const col = v > 60 ? '#ef4444' : v > 40 ? '#f59e0b' : '#10b981';
                fcHtml += `<div class="fatigue-team">
                    <div class="fatigue-team-label">${esc(name)}</div>
                    <div class="fatigue-bar-bg"><div class="fatigue-bar-fill" style="width:${Math.min(v,100)}%;background:${col}"></div></div>
                    <div class="fatigue-val" style="color:${col}">${v.toFixed(1)}</div>
                </div>`;
            });
            fcHtml += '</div>';
        }
        if (fc.profiles && fc.profiles.length) {
            fcHtml += '<div class="fatigue-grid">';
            fc.profiles.forEach(p => {
                const isTop = p.track_id === fc.most_fatigued_track_id;
                const label = (p.fatigue_label || 'MEDIUM').toUpperCase();
                const pillCls = label === 'HIGH' ? 'pill-high' : label === 'LOW' ? 'pill-low' : 'pill-medium';
                const m = p.metrics || {};
                fcHtml += `<div class="fatigue-player${isTop?' highlight':''}">
                    <div class="fp-header">
                        <span class="fp-id">Track #${p.track_id}</span>
                        <span class="pill ${pillCls}">${label}</span>
                    </div>
                    <div class="fp-score">${p.fatigue_score ?? '-'}</div>
                    <div class="fp-metrics">
                        Velocity drop: <span>${m.velocity_ceiling_drop_pct != null ? m.velocity_ceiling_drop_pct.toFixed(1)+'%' : '-'}</span><br>
                        Sprint drift: <span>${m.sprint_threshold_drift_pct != null ? m.sprint_threshold_drift_pct.toFixed(1)+'%' : '-'}</span><br>
                        Recovery expansion: <span>${m.recovery_expansion_seconds != null ? m.recovery_expansion_seconds.toFixed(1)+'s' : '-'}</span><br>
                        Predictability: <span>${m.predictability_score != null ? m.predictability_score.toFixed(0) : '-'}</span>
                    </div>
                </div>`;
            });
            fcHtml += '</div>';
        }
        if (fc.clock_confidence) {
            const cc = fc.clock_confidence;
            const ccCls = cc === 'high' ? 'pill-low' : cc === 'low' ? 'pill-high' : 'pill-medium';
            fcHtml += `<div class="fatigue-conf"><span class="pill ${ccCls}">${cc} confidence</span></div>`;
        }
        fcHtml += '</div>';
        parts.push(fcHtml);
    }

    // E. Team Shape
    const ts = d.team_separation || {};
    const sh = d.shape || {};
    const t0w = sh.team_0?.avg_width_metres;
    const t1w = sh.team_1?.avg_width_metres;
    parts.push(`<div class="card" id="shape"><div class="card-title">Team Shape</div>
        <div class="shape-grid">
            <div class="shape-team">
                <div class="shape-label">${esc((ts.team_0_colour_name||'Team A').toUpperCase())}</div>
                <div class="shape-count">${ts.team_0_players||0} players</div>
                <div class="shape-val">${t0w != null ? t0w.toFixed(1)+'m' : '-'}</div>
            </div>
            <div class="shape-team">
                <div class="shape-label">${esc((ts.team_1_colour_name||'Team B').toUpperCase())}</div>
                <div class="shape-count">${ts.team_1_players||0} players</div>
                <div class="shape-val">${t1w != null ? t1w.toFixed(1)+'m' : '-'}</div>
            </div>
        </div>
    </div>`);

    // F. Physical Summary
    const ph = d.physical || {};
    parts.push(`<div class="card" id="phys"><div class="card-title">Physical Summary</div>
        <div class="phys-grid">
            <div><div class="phys-num">${ph.total_sprints ?? 0}</div><div class="phys-label">Sprints</div></div>
            <div><div class="phys-num">${ph.max_speed_kmh ? ph.max_speed_kmh.toFixed(1) : '-'}</div><div class="phys-label">Max Speed (km/h)</div></div>
            <div><div class="phys-num">${ph.players_analysed ?? 0}</div><div class="phys-label">Players</div></div>
        </div>
    </div>`);

    // G. Situation Timeline
    const evts = (d.situations || {}).events || [];
    let tlInner = '';
    if (evts.length) {
        const total = evts.reduce((s,e) => s + (e.end_time - e.start_time), 0);
        const segs = evts.map(e => {
            const w = ((e.end_time - e.start_time) / total * 100);
            const cls = e.situation === 'OPEN_PLAY' ? 'tl-open' : 'tl-dead';
            const label = e.situation === 'OPEN_PLAY' ? 'PLAY' : 'DEAD';
            return `<div class="tl-seg ${cls}" style="width:${w}%" title="${e.situation}: ${e.start_time}s - ${e.end_time}s">${w > 8 ? label : ''}</div>`;
        }).join('');
        const last = evts[evts.length-1];
        tlInner = `<div class="tl-bar">${segs}</div>
            <div class="tl-times"><span>0s</span><span>${last.end_time}s</span></div>
            <div class="tl-legend">
                <span><span class="tl-dot" style="background:rgba(59,130,246,0.5)"></span>Open Play</span>
                <span><span class="tl-dot" style="background:rgba(75,85,99,0.5)"></span>Dead Ball</span>
            </div>`;
    } else {
        tlInner = '<div style="color:#6b7280;font-size:13px">No events detected</div>';
    }
    parts.push(`<div class="card" id="timeline"><div class="card-title">Situation Timeline</div>${tlInner}</div>`);

    // H. Player Cards
    const players = ph.players || [];
    if (players.length) {
        let pHtml = '<div class="card" id="players"><div class="card-title">Player Performance</div><div class="p-grid">';
        players.forEach(p => {
            const tm = (p.team || '').toLowerCase();
            const bc = tm.includes('red') ? 'b-red' : tm.includes('blue') ? 'b-blue' : 'b-other';
            const cc = p.confidence === 'high' ? 'pill-low' : p.confidence === 'low' ? 'pill-high' : 'pill-medium';
            pHtml += `<div class="p-card">
                <div class="p-head">
                    <span class="p-id">#${p.track_id}</span>
                    <span class="p-badge ${bc}">${esc(p.team||'?')}</span>
                    <span class="pill ${cc}">${p.confidence||'?'}</span>
                </div>
                <div class="p-stats">
                    <div><span class="p-stat-label">Sprints</span></div><div><span class="p-stat-val">${p.sprints??0}</span></div>
                    <div><span class="p-stat-label">Distance</span></div><div><span class="p-stat-val">${p.distance_range||'-'}</span></div>
                    <div><span class="p-stat-label">Max Speed</span></div><div><span class="p-stat-val">${p.max_speed_display||'-'}</span></div>
                </div>
            </div>`;
        });
        pHtml += '</div></div>';
        parts.push(pHtml);
    }

    // I. Data Quality
    const trust = brain.metrics_to_trust || [];
    const question = brain.metrics_to_question || [];
    const anomalies = brain.anomalies_summary || '';
    const corrections = d.corrections_applied || {};
    let corrHtml = Object.entries(corrections).map(([k,v]) =>
        `${k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}: ${v}`
    ).join('<br>') || 'None';
    parts.push(`<div class="card" id="dq">
        <div class="dq-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.dq-arrow').classList.toggle('open')">
            <div class="dq-title">Data Quality &amp; Corrections</div>
            <div class="dq-arrow">&#9660;</div>
        </div>
        <div class="dq-body">
            <div class="dq-sub"><div class="dq-sub-title">Trusted Metrics</div>
                <div class="dq-sub-items">${trust.length ? trust.map(t=>'&bull; '+esc(t)).join('<br>') : 'None specified'}</div></div>
            <div class="dq-sub"><div class="dq-sub-title">Metrics to Question</div>
                <div class="dq-sub-items">${question.length ? question.map(t=>'&bull; '+esc(t)).join('<br>') : 'None'}</div></div>
            <div class="dq-sub"><div class="dq-sub-title">Anomalies</div>
                <div class="dq-sub-items">${anomalies ? esc(anomalies) : 'None detected'}</div></div>
            <div class="dq-sub"><div class="dq-sub-title">Corrections Applied</div>
                <div class="dq-sub-items">${corrHtml}</div></div>
        </div>
    </div>`);

    sec.innerHTML = parts.join('');

    // Animate in
    const items = sec.querySelectorAll('.brain-banner, .conf-badge, .card');
    items.forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 150);
    });
}
</script>
</body>
</html>
