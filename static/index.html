// ═══════════════════════════════════════════════════════
//  LIVE ANALYSIS
// ═══════════════════════════════════════════════════════

let liveSessionId = null;
let liveTracks = {};
let liveConfirmedCount = 0;
let liveUncertainCount = 0;
let livePaused = false;
let liveStartTime = null;
let liveTimerIv = null;
let liveSkippedIds = new Set();
let liveSeenTrackIds = new Set();
let jerseyMap = {};
let shownTrackIds = new Set();
let uncertainQueue = [];
let liveStatusMsgIv = null;
const MAX_VISIBLE_CARDS = 3;
const UNCERTAIN_BATCH_THRESHOLD = 5;

const LIVE_STATUS_MSGS = [
    'EXTRACTING FRAMES...',
    'DETECTING PLAYERS...',
    'TRACKING MOVEMENT...',
    'MEASURING POSITIONS...',
    'ANALYSING FOOTAGE...',
    'PROCESSING BATCH...',
];

async function startLiveAnalysis() {
    // Inject live player HTML on demand (never in static HTML to prevent flash)
    const ls = $('liveSection');
    if (!ls.dataset.injected) {
        ls.innerHTML = `<div class="live-wrap">
            <div class="live-video-wrap">
                <video id="liveVideo" muted playsinline></video>
                <canvas id="liveCanvas"></canvas>
            </div>
            <div class="live-progress">
                <div class="live-progress-bar-bg"><div class="live-progress-bar-fill" id="liveProgressFill" style="width:0%"></div></div>
                <div class="live-stats">
                    <span id="liveFrameInfo">Frame 0/0</span>
                    <span id="livePlayerInfo">0 players tracked</span>
                    <span id="liveElapsed">00:00</span>
                </div>
            </div>
            <div id="liveStatusMsg" class="live-status-msg"></div>
        </div>
        <div class="uncertain-stack" id="uncertainStack"></div>`;
        ls.dataset.injected = '1';
    }
    hide('uploadSection', 'resultsSection', 'errorSection', 'loadingSection');
    ls.style.cssText = 'display:block';
    show('liveSection');

    // Load video metadata
    const url = URL.createObjectURL(selectedFile);
    const liveVid = $('liveVideo');
    liveVid.src = url;

    try {
        await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Video load timeout')), 15000);
            liveVid.onloadedmetadata = () => { clearTimeout(timeout); resolve(); };
            liveVid.onerror = (e) => { clearTimeout(timeout); reject(e); };
        });
    } catch (e) {
        fallbackToQuick('Video load failed: ' + (e.message || 'unknown'));
        return;
    }

    const vw = liveVid.videoWidth;
    const vh = liveVid.videoHeight;
    if (!vw || !vh) { fallbackToQuick('Invalid video'); return; }

    // Start playing video in browser
    liveVid.play().catch(() => {});

    // Upload video to server and start background BoT-SORT pipeline
    let liveJobId = null;
    try {
        const startFd = new FormData();
        startFd.append('video', selectedFile);
        startFd.append('frame_width', String(vw));
        startFd.append('frame_height', String(vh));
        startFd.append('clip_type', 'match');
        startFd.append('fps', '25');
        $('liveStatusMsg').textContent = 'UPLOADING VIDEO...';
        const res = await fetch(`${API_BASE}/api/v1/stream/start`, {
            method: 'POST', body: startFd
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        liveSessionId = data.session_id;
        liveJobId = data.job_id;
    } catch (e) {
        fallbackToQuick('Session start failed: ' + (e.message || 'unknown'));
        return;
    }

    // Rotating status messages
    let statusIdx = 0;
    $('liveStatusMsg').textContent = LIVE_STATUS_MSGS[0];
    liveStatusMsgIv = setInterval(() => {
        statusIdx = (statusIdx + 1) % LIVE_STATUS_MSGS.length;
        $('liveStatusMsg').textContent = LIVE_STATUS_MSGS[statusIdx];
    }, 8000);

    liveStartTime = Date.now();
    liveTimerIv = setInterval(updateLiveTimer, 1000);
    liveConfirmedCount = 0;
    liveUncertainCount = 0;
    liveTracks = {};
    liveSkippedIds = new Set();
    liveSeenTrackIds = new Set();
    jerseyMap = {};
    shownTrackIds = new Set();
    uncertainQueue = [];

    // Set up canvas for drawing overlays
    const liveCanvas = $('liveCanvas');
    const lctx = liveCanvas.getContext('2d');

    // Ball visibility counter
    let ballMissingPolls = 0;

    // Poll for progress every 2 seconds
    const progressIv = setInterval(async () => {
        try {
            const res = await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/progress`);
            if (!res.ok) return;
            const prog = await res.json();

            // Update progress bar
            const total = prog.total_frames || 1;
            const done = prog.frames_processed || 0;
            const pct = Math.min(100, (done / total * 100)).toFixed(1);
            $('liveProgressFill').style.width = pct + '%';
            $('liveFrameInfo').textContent = `Frame ${done}/${total}`;

            // Track count
            const tracks = prog.tracks || [];
            const confirmed = tracks.filter(t => t.confirmed).length;
            $('livePlayerInfo').textContent = `${tracks.length} tracked · ${confirmed} confirmed`;

            // Draw tracking overlay on canvas
            liveCanvas.width = liveVid.clientWidth;
            liveCanvas.height = liveVid.clientHeight;
            lctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);

            // Scale factor: server coordinates → displayed video size
            const scaleX = liveCanvas.width / vw;
            const scaleY = liveCanvas.height / vh;

            tracks.forEach(tk => {
                if (!tk.bbox || tk.bbox.length < 4) return;
                const x1 = tk.bbox[0] * scaleX;
                const y1 = tk.bbox[1] * scaleY;
                const x2 = tk.bbox[2] * scaleX;
                const y2 = tk.bbox[3] * scaleY;
                const w = x2 - x1;
                const h = y2 - y1;

                // Team colours
                let color = '#9ca3af'; // grey unknown
                if (tk.team_id === 0) color = '#3b82f6'; // blue
                else if (tk.team_id === 1) color = '#ef4444'; // red

                lctx.strokeStyle = color;
                lctx.lineWidth = 2;
                if (tk.confirmed) {
                    lctx.setLineDash([]);
                } else {
                    lctx.setLineDash([4, 4]);
                }
                lctx.strokeRect(x1, y1, w, h);

                // Label — use teal jersey label if coach has confirmed this track
                lctx.setLineDash([]);
                const jerseyLabel = jerseyMap[tk.track_id];
                if (jerseyLabel) {
                    // Teal, bold, larger font for labelled players
                    lctx.font = 'bold 13px Inter, sans-serif';
                    const lw = lctx.measureText(jerseyLabel).width + 10;
                    lctx.fillStyle = '#00d4aa';
                    lctx.fillRect(x1, y1 - 18, lw, 18);
                    lctx.fillStyle = '#000';
                    lctx.fillText(jerseyLabel, x1 + 5, y1 - 4);
                } else {
                    const label = `#${tk.track_id}`;
                    lctx.font = 'bold 11px Inter, sans-serif';
                    lctx.fillStyle = color;
                    lctx.fillRect(x1, y1 - 16, lctx.measureText(label).width + 8, 16);
                    lctx.fillStyle = '#fff';
                    lctx.fillText(label, x1 + 4, y1 - 4);
                }
            });

            // Draw ball
            if (prog.ball_bbox && prog.ball_bbox.length >= 4) {
                ballMissingPolls = 0;
                const bx1 = prog.ball_bbox[0] * scaleX;
                const by1 = prog.ball_bbox[1] * scaleY;
                const bx2 = prog.ball_bbox[2] * scaleX;
                const by2 = prog.ball_bbox[3] * scaleY;
                const bcx = (bx1 + bx2) / 2;
                const bcy = (by1 + by2) / 2;
                const br = Math.max((bx2 - bx1), (by2 - by1)) / 2 + 4;

                // Pulsing yellow circle
                const pulse = 1 + 0.2 * Math.sin(Date.now() / 200);
                lctx.beginPath();
                lctx.arc(bcx, bcy, br * pulse, 0, Math.PI * 2);
                lctx.strokeStyle = '#f59e0b';
                lctx.lineWidth = 2.5;
                lctx.setLineDash([]);
                lctx.stroke();
                // BALL label
                lctx.fillStyle = '#f59e0b';
                lctx.font = 'bold 10px Inter, sans-serif';
                lctx.fillText('BALL', bcx - 14, bcy + br * pulse + 14);
            } else {
                ballMissingPolls++;
                if (ballMissingPolls >= 5) {
                    lctx.fillStyle = 'rgba(245, 158, 11, 0.7)';
                    lctx.font = '12px Inter, sans-serif';
                    lctx.fillText('Ball: not visible', 10, liveCanvas.height - 10);
                }
            }

            // Auto-trigger uncertain cards for new confirmed tracks (first 10 only)
            tracks.forEach(tk => {
                if (tk.confirmed && !shownTrackIds.has(tk.track_id) && shownTrackIds.size < 10) {
                    shownTrackIds.add(tk.track_id);
                    uncertainQueue.push({
                        track_id: tk.track_id,
                        team_colour: tk.team_id,
                        crop_b64: null,
                    });
                }
            });
            if (uncertainQueue.length > 0 && $('uncertainStack').children.length === 0) {
                showUncertainCards();
            }

            // Check if tracking is done
            if (prog.status === 'completed') {
                clearInterval(progressIv);
                clearInterval(liveTimerIv);
                clearInterval(liveStatusMsgIv);
                $('liveFrameInfo').textContent = 'GENERATING FULL REPORT...';
                $('liveStatusMsg').textContent = '';
                $('liveProgressFill').style.width = '100%';
                liveVid.pause();

                // Finalise — get job_id and transition to report polling
                try {
                    const finRes = await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/finalise`, {
                        method: 'POST',
                    });
                    if (!finRes.ok) throw new Error(`HTTP ${finRes.status}`);
                    const finData = await finRes.json();

                    hide('liveSection');
                    show('loadingSection');
                    startTime = Date.now();
                    $('loadingStatus').textContent = 'RUNNING FULL ANALYSIS PIPELINE...';
                    updateTimer();
                    timerIv = setInterval(updateTimer, 1000);

                    poll(finData.job_id);
                } catch (e) {
                    fallbackToQuick('Finalise failed: ' + (e.message || 'unknown'));
                }
            }
        } catch (e) {
            console.error('Progress poll error:', e);
        }
    }, 2000);
}

function fallbackToQuick(reason) {
    console.warn('Live fallback:', reason);
    clearInterval(liveTimerIv);
    clearInterval(liveStatusMsgIv);
    hide('liveSection');
    liveSessionId = null;
    analysisMode = 'quick';
    alert('Live analysis unavailable — switching to quick analysis.\n\n' + reason);
    startAnalysis();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateLiveTimer() {
    if (!liveStartTime) return;
    const s = Math.floor((Date.now() - liveStartTime) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    $('liveElapsed').textContent = `${mm}:${ss}`;
}


function showUncertainCards() {
    const stack = $('uncertainStack');

    const visible = uncertainQueue.splice(0, MAX_VISIBLE_CARDS);

    visible.forEach(u => {
        const card = document.createElement('div');

        card.dataset.trackId = u.track_id;

        const cropSrc = u.crop_b64 ? `data:image/jpeg;base64,${u.crop_b64}` : '';
        const teamLabel = u.team_colour === 0 ? 'Blue' : u.team_colour === 1 ? 'Red' : 'Unknown';

        card.innerHTML = `
            <div style="flex-shrink:0">
                ${cropSrc
                    ? `<img class="uc-crop" id="ucCrop_${u.track_id}" src="${cropSrc}" alt="player crop"
                           onclick="this.classList.toggle('zoomed');document.getElementById('ucZoomBtn_${u.track_id}').textContent=this.classList.contains('zoomed')?'- 1x':'+ 2x ZOOM'">`
                    : `<div class="uc-crop" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px">No crop</div>`
                }
                ${cropSrc
                    ? `<button class="uc-zoom-btn" id="ucZoomBtn_${u.track_id}"
                           onclick="const img=document.getElementById('ucCrop_${u.track_id}');img.classList.toggle('zoomed');this.textContent=img.classList.contains('zoomed')?'- 1x':'+ 2x ZOOM'">+ 2x ZOOM</button>`
                    : ''
                }
            </div>
            <div class="uc-info">
                <div class="uc-title">Track #${u.track_id} detected</div>
                <div class="uc-team">Team: ${esc(teamLabel)}</div>
                <div class="uc-jersey-prompt">Can you see a jersey number?</div>
                <div class="uc-yn-btns">
                    <button class="uc-yn-yes" onclick="document.getElementById('ucJerseyFields_${u.track_id}').style.display='flex'">YES — type it above</button>
                    <button class="uc-yn-no" onclick="skipUncertain(${u.track_id}, this)">NO — skip</button>
                </div>
                <div class="uc-fields" id="ucJerseyFields_${u.track_id}" style="display:none">
                    <input type="text" placeholder="Jersey #" class="uc-jersey" maxlength="3">
                    <input type="text" placeholder="Player name" class="uc-name">
                </div>
                <div class="uc-actions">
                    <button class="uc-confirm-btn" onclick="confirmUncertain(${u.track_id}, this)">Confirm</button>
                    <button class="uc-skip-btn" onclick="skipUncertain(${u.track_id}, this)">Skip</button>
                </div>
                <div class="uc-timer-bar"><div class="uc-timer-fill" style="width:100%"></div></div>
            </div>
        `;
        stack.appendChild(card);

        // 15s auto-skip
        const fill = card.querySelector('.uc-timer-fill');
        let elapsed = 0;
        const tmr = setInterval(() => {
            elapsed += 500;
            const pct = Math.max(0, 100 - (elapsed / 15000 * 100));
            fill.style.width = pct + '%';
            if (elapsed >= 15000) {
                clearInterval(tmr);
                skipUncertain(u.track_id, card.querySelector('.uc-skip-btn'));
            }
        }, 500);
        card._timerIv = tmr;
    });
}

async function confirmUncertain(trackId, btn) {
    const card = btn.closest('.uncertain-card');
    clearInterval(card._timerIv);
    const jersey = card.querySelector('.uc-jersey').value.trim();
    const name = card.querySelector('.uc-name').value.trim();

    // Send as FormData since the endpoint uses Form(...)
    try {
        const fd = new FormData();
        fd.append('track_id', trackId);
        fd.append('jersey_number', jersey || '');
        fd.append('player_name', name || '');
        fd.append('team_colour', '');
        await fetch(`${API_BASE}/api/v1/stream/${liveSessionId}/confirm`, {
            method: 'POST', body: fd
        });
    } catch (e) { /* continue anyway */ }

    // Store in jerseyMap for teal canvas labels
    if (jersey) {
        jerseyMap[trackId] = `#${jersey}`;
    } else if (name) {
        jerseyMap[trackId] = name;
    }

    if (liveTracks[trackId]) {
        liveTracks[trackId].coach_confirmed = true;
        liveTracks[trackId].coach_label = jersey ? `#${jersey}` : (name || 'Confirmed');
        liveTracks[trackId].state = 'confirmed';
    }
    liveConfirmedCount++;
    liveUncertainCount = Math.max(0, liveUncertainCount - 1);

    card.remove();
    checkResumeLive();
}

function skipUncertain(trackId, btn) {
    const card = btn.closest('.uncertain-card');
    if (!card) return;
    clearInterval(card._timerIv);
    liveSkippedIds.add(trackId);
    liveUncertainCount = Math.max(0, liveUncertainCount - 1);

    card.remove();
    checkResumeLive();
}

function checkResumeLive() {
    const stack = $('uncertainStack');
    if (stack.children.length === 0) {
        if (uncertainQueue.length > 0) {
            showUncertainCards();
        } else {
            livePaused = false;
        }
    }
}

// ── TACTICAL MAP & MATCH FEED FUNCTIONS ──
function getTeamColor(colourName) {
    const name = (colourName || '').toLowerCase();
    if (name.includes('blue')) return '#3b82f6';
    if (name.includes('red')) return '#ef4444';
    if (name.includes('white')) return '#f9fafb';
    if (name.includes('dark') || name.includes('black')) return '#374151';
    if (name.includes('yellow')) return '#f59e0b';
    if (name.includes('green')) return '#10b981';
    // Default fallback
    return name.includes('team 0') ? '#3b82f6' : '#ef4444';
}

function inferPlayerPosition(player, teamId) {
    // Simple position inference based on distance covered
    const distance = player.distance_metres || 0;
    const maxDistance = Math.max(...(ph.players || []).map(p => p.distance_metres || 0));
    
    if (maxDistance === 0) return 'back';
    
    const normalized = distance / maxDistance;
    if (normalized < 0.3) return 'back';      // GK/defender - low distance
    if (normalized > 0.7) return 'front';     // Forward - high distance  
    return 'middle';                          // Midfielder
}

function estimatePlayerPosition(player, teamId) {
    const position = inferPlayerPosition(player, teamId);
    const isTeam0 = teamId === 0;
    
    // Team 0 on left side (0-60% of pitch), Team 1 on right side (40-100%)
    const xRange = isTeam0 ? [0.1, 0.6] : [0.4, 0.9];
    const yRange = [0.2, 0.8]; // Vertical spread
    
    let x, y;
    if (position === 'back') {
        x = isTeam0 ? 0.15 : 0.85;
        y = 0.3 + Math.random() * 0.4; // Defenders spread vertically
    } else if (position === 'front') {
        x = isTeam0 ? 0.45 : 0.55;
        y = 0.35 + Math.random() * 0.3; // Forwards more central
    } else {
        x = isTeam0 ? 0.25 : 0.75;
        y = 0.25 + Math.random() * 0.5; // Midfielders spread across
    }
    
    // Add some randomness within ranges
    x = xRange[0] + (x - xRange[0]) * (xRange[1] - xRange[0]);
    y = yRange[0] + Math.random() * (yRange[1] - yRange[0]);
    
    return { x: Math.max(0.05, Math.min(0.95, x)), y: Math.max(0.05, Math.min(0.95, y)) };
}

function buildConvexHull(points) {
    if (points.length < 3) return points;
    
    // Simple convex hull approximation using sorted angles from centroid
    const centroid = points.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
    centroid.x /= points.length;
    centroid.y /= points.length;
    
    // Sort points by angle from centroid
    const sorted = points.slice().sort((a, b) => {
        const angleA = Math.atan2(a.y - centroid.y, a.x - centroid.x);
        const angleB = Math.atan2(b.y - centroid.y, b.x - centroid.x);
        return angleA - angleB;
    });
    
    return sorted;
}

function renderTacticalMap() {
    if (!ph.players || ph.players.length === 0) {
        $('pitchContainer').innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">No player data available</div>';
        $('tacticalMap').style.display = 'block';
        return;
    }
    
    const pitchWidth = 105;
    const pitchHeight = 68;
    const svgWidth = 600;
    const svgHeight = (svgWidth / pitchWidth) * pitchHeight;
    
    const t0Name = (ts.team_0_colour_name || 'Team A').toUpperCase();
    const t1Name = (ts.team_1_colour_name || 'Team B').toUpperCase();
    const t0Color = getTeamColor(ts.team_0_colour_name);
    const t1Color = getTeamColor(ts.team_1_colour_name);
    
    // Group players by team and estimate positions
    const team0Players = ph.players.filter(p => 
        (p.team || '').toLowerCase().includes((ts.team_0_colour_name || '').toLowerCase()) || 
        p.team_id === 0
    );
    const team1Players = ph.players.filter(p => 
        (p.team || '').toLowerCase().includes((ts.team_1_colour_name || '').toLowerCase()) || 
        p.team_id === 1
    );
    
    // Estimate positions for each player
    const team0Positions = team0Players.map(p => ({ ...estimatePlayerPosition(p, 0), player: p }));
    const team1Positions = team1Players.map(p => ({ ...estimatePlayerPosition(p, 1), player: p }));
    
    // Build SVG
    let svg = `<svg class="pitch-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" xmlns="http://www.w3.org/2000/svg">
        <!-- Pitch background -->
        <rect width="${svgWidth}" height="${svgHeight}" fill="#2d6a2d"/>
        
        <!-- Pitch lines -->
        <g stroke="white" stroke-width="1.5" fill="none">
            <!-- Outer lines -->
            <rect x="10" y="10" width="${svgWidth - 20}" height="${svgHeight - 20}"/>
            <!-- Halfway line -->
            <line x1="${svgWidth/2}" y1="10" x2="${svgWidth/2}" y2="${svgHeight - 10}"/>
            <!-- Centre circle -->
            <circle cx="${svgWidth/2}" cy="${svgHeight/2}" r="40"/>
            <circle cx="${svgWidth/2}" cy="${svgHeight/2}" r="3" fill="white"/>
            <!-- Penalty areas -->
            <rect x="10" y="${(svgHeight/2) - 66}" width="88" height="132"/>
            <rect x="${svgWidth - 98}" y="${(svgHeight/2) - 66}" width="88" height="132"/>
            <!-- Goal areas -->
            <rect x="10" y="${(svgHeight/2) - 28}" width="32" height="56"/>
            <rect x="${svgWidth - 42}" y="${(svgHeight/2) - 28}" width="32" height="56"/>
            <!-- Goals -->
            <rect x="2" y="${(svgHeight/2) - 20}" width="8" height="40" fill="white"/>
            <rect x="${svgWidth - 10}" y="${(svgHeight/2) - 20}" width="8" height="40" fill="white"/>
        </g>`;
    
    // Team 0 hull
    if (team0Positions.length >= 3) {
        const hull = buildConvexHull(team0Positions);
        const hullPoints = hull.map(p => `${p.x * svgWidth},${p.y * svgHeight}`).join(' ');
        svg += `<polygon class="team-hull" points="${hullPoints}" fill="${t0Color}" stroke="${t0Color}"/>`;
    }
    
    // Team 1 hull
    if (team1Positions.length >= 3) {
        const hull = buildConvexHull(team1Positions);
        const hullPoints = hull.map(p => `${p.x * svgWidth},${p.y * svgHeight}`).join(' ');
        svg += `<polygon class="team-hull" points="${hullPoints}" fill="${t1Color}" stroke="${t1Color}"/>`;
    }
    
    // Player dots
    team0Positions.forEach(pos => {
        const x = pos.x * svgWidth;
        const y = pos.y * svgHeight;
        const label = pos.player.display_label || `#${pos.player.track_id}`;
        svg += `<circle class="player-dot" cx="${x}" cy="${y}" r="8" fill="${t0Color}" stroke="white" stroke-width="1.5"/>
            <text class="player-label" x="${x}" y="${y - 12}">${esc(label)}</text>`;
    });
    
    team1Positions.forEach(pos => {
        const x = pos.x * svgWidth;
        const y = pos.y * svgHeight;
        const label = pos.player.display_label || `#${pos.player.track_id}`;
        svg += `<circle class="player-dot" cx="${x}" cy="${y}" r="8" fill="${t1Color}" stroke="white" stroke-width="1.5"/>
            <text class="player-label" x="${x}" y="${y - 12}">${esc(label)}</text>`;
    });
    
    svg += '</svg>';
    
    $('pitchContainer').innerHTML = svg;
    
    // Team stats
    const t0Width = (sh.team_0 || {}).avg_width_metres || 0;
    const t1Width = (sh.team_1 || {}).avg_width_metres || 0;
    const t0Count = ts.team_0_players || team0Players.length;
    const t1Count = ts.team_1_players || team1Players.length;
    
    $('teamStats').innerHTML = `
        <div class="team-stats-col">
            <div class="team-stats-name">${esc(t0Name)} TEAM</div>
            <div class="team-stats-value">${t0Width.toFixed(1)}m</div>
            <div class="team-stats-label">Width</div>
            <div class="team-stats-value">${t0Count}</div>
            <div class="team-stats-label">Players tracked</div>
        </div>
        <div class="team-stats-col">
            <div class="team-stats-name">${esc(t1Name)} TEAM</div>
            <div class="team-stats-value">${t1Width.toFixed(1)}m</div>
            <div class="team-stats-label">Width</div>
            <div class="team-stats-value">${t1Count}</div>
            <div class="team-stats-label">Players tracked</div>
        </div>
    `;
    
    $('tacticalMap').style.display = 'block';
}

function renderMatchFeed() {
    const events = (d.situations || {}).events || [];
    const feedItems = [];
    
    // Add situation events
    events.forEach(event => {
        const start = event.start_time || 0;
        const minutes = Math.floor(start / 60);
        const seconds = Math.floor(start % 60);
        const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        const isOpen = event.situation === 'OPEN_PLAY';
        feedItems.push({
            time: timeStr,
            icon: isOpen ? '▶' : '⏸',
            title: isOpen ? 'Open play' : 'Play stopped',
            detail: `${((event.end_time || 0) - start).toFixed(1)}s phase`,
            type: isOpen ? 'open' : 'dead'
        });
    });
    
    // Add sprint events
    ph.players.forEach(player => {
        if (player.sprints > 0) {
            feedItems.push({
                time: 'est.',
                icon: '⚡',
                title: `${player.display_label || `Player ${player.track_id}`} sprint`,
                detail: `${player.max_speed_kmh || 0} km/h`,
                type: 'sprint'
            });
        }
    });
    
    // Sort by time (put estimated times at end)
    const withTime = feedItems.filter(f => f.time !== 'est.');
    const estimated = feedItems.filter(f => f.time === 'est.');
    withTime.sort((a, b) => {
        const aSecs = parseInt(a.time.split(':')[0]) * 60 + parseInt(a.time.split(':')[1]);
        const bSecs = parseInt(b.time.split(':')[0]) * 60 + parseInt(b.time.split(':')[1]);
        return aSecs - bSecs;
    });
    
    const sortedFeed = [...withTime, ...estimated];
    
    const feedHtml = sortedFeed.map(item => `
        <div class="feed-item feed-${item.type}">
            <div class="feed-time">${item.time}</div>
            <div class="feed-icon">${item.icon}</div>
            <div class="feed-content">
                <div class="feed-title">${esc(item.title)}</div>
                <div class="feed-detail">${esc(item.detail)}</div>
            </div>
        </div>
    `).join('');
    
    $('feedContainer').innerHTML = feedHtml || '<div style="text-align:center;color:var(--muted);padding:20px;">No events to display</div>';
    $('matchFeed').style.display = 'block';
}

// === REPORT TABS ===
function switchReportTab(tab, btn) {
  document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.report-tab-pane').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('active');
  });
  const pane = document.querySelector('.report-tab-' + tab);
  if (pane) {
    pane.style.display = 'block';
    pane.classList.add('active');
  }
  if (btn) btn.classList.add('active');
}

// === DOWNLOAD REPORT ===
function downloadReport() {
  const raw = window._lastRawReport || '';
  if (!raw) return;
  const blob = new Blob([raw], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `athlink-report-${Date.now()}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

// === COPY REPORT ===
function copyReport() {
  const raw = window._lastRawReport || '';
  if (!raw) return;
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.getElementById('copyReportBtn');
    const orig = btn.innerHTML;
    btn.innerHTML = '&#10003; COPIED';
    btn.style.color = 'var(--teal)';
    btn.style.borderColor = 'var(--teal)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
  });
}
