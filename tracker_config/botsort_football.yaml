tracker_type: botsort
track_high_thresh: 0.20
track_low_thresh: 0.05
new_track_thresh: 0.2
track_buffer: 90
match_thresh: 0.8
fuse_score: true

# BoT-SORT specific — camera motion compensation via sparse optical flow
gmc_method: sparseOptFlow

# ReID — disabled for now, enable after tracking is stable
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: false
