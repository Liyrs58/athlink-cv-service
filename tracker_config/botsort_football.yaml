tracker_type: botsort
track_high_thresh: 0.3
track_low_thresh: 0.1
new_track_thresh: 0.35
# Football occlusions can last 2-10s. 300 frames ~= 12s @ 25fps.
track_buffer: 300
match_thresh: 0.8
fuse_score: true

# Camera motion compensation via sparse optical flow
gmc_method: sparseOptFlow

# ReID — natively supported by Ultralytics >= 8.3.114
# Disabled due to numpy/torch mismatch in Ultralytics trackers
with_reid: False
model: auto
proximity_thresh: 0.5
appearance_thresh: 0.25
