tracker_type: botsort

# BYTE dual-threshold
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.4

# Track lifetime: 24 seconds @ 25fps native
# With frameStride=5, this = 120 update calls = 24 seconds real time
# FIX 3: Extended for off-screen pan survival
track_buffer: 120

# Distance thresholds (BoT-SORT uses max distance, NOT min IoU)
# FIX 2: Aggressive thresholds for fast pans
match_thresh: 0.30          # 30% of frame width apart (was 0.95, too strict)
proximity_thresh: 0.5       # ReID works even with low IoU (was 0.9)
appearance_thresh: 0.55     # Strict ReID — prevents teammate ID theft

# Broadcast footage: disable ORB CMC (smooth pans, not shake)
gmc_method: none

# ReID model: upgrade to x1_0 for actual discriminative power
with_reid: True
frame_rate: 25
fuse_score: True
